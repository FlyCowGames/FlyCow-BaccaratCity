<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat City - Improvement Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100%;
    background: #0a0a12; color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    font-size: 14px; line-height: 1.6;
  }

  a { color: #d4af37; text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    text-align: center; padding: 40px 20px 30px;
    border-bottom: 1px solid rgba(212,175,55,0.2);
  }
  header h1 {
    font-family: 'Cinzel', serif; font-weight: 900;
    font-size: 2.4em; letter-spacing: 0.15em;
    color: #d4af37;
  }
  header .subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95em; color: rgba(212,175,55,0.6);
    margin-top: 6px; letter-spacing: 0.3em;
  }
  header .meta {
    margin-top: 12px; font-size: 0.85em;
    color: rgba(232,224,208,0.5);
  }
  header .back-link {
    display: inline-block; margin-top: 16px;
    padding: 6px 20px; border: 1px solid rgba(212,175,55,0.4);
    font-family: 'Cinzel', serif; font-size: 0.85em;
    color: #d4af37; transition: all 0.3s;
  }
  header .back-link:hover {
    background: rgba(212,175,55,0.1); text-decoration: none;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

  /* Stats */
  .stats-bar {
    display: flex; gap: 30px; padding: 24px 0;
    border-bottom: 1px solid rgba(212,175,55,0.1);
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat .number {
    font-family: 'Cinzel', serif; font-size: 1.8em;
    color: #d4af37; font-weight: 700;
  }
  .stat .label {
    font-size: 0.7em; color: rgba(232,224,208,0.4);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Domain legend */
  .domain-legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(212,175,55,0.1);
  }
  .domain-legend-label {
    font-size: 0.7em; color: rgba(212,175,55,0.5);
    letter-spacing: 0.15em; text-transform: uppercase;
    align-self: center; margin-right: 8px;
  }

  /* Domain badge styles */
  .badge {
    display: inline-block;
    padding: 2px 8px; font-size: 0.65em;
    letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 2px; white-space: nowrap;
  }
  .badge-rendering      { background: rgba(180,100,255,0.15); color: #b464ff; border: 1px solid rgba(180,100,255,0.3); }
  .badge-atmosphere     { background: rgba(80,180,255,0.15);  color: #50b4ff; border: 1px solid rgba(80,180,255,0.3); }
  .badge-animation      { background: rgba(80,220,160,0.15);  color: #50dca0; border: 1px solid rgba(80,220,160,0.3); }
  .badge-landmarks      { background: rgba(255,180,80,0.15);  color: #ffb450; border: 1px solid rgba(255,180,80,0.3); }
  .badge-events         { background: rgba(255,100,100,0.15); color: #ff6464; border: 1px solid rgba(255,100,100,0.3); }
  .badge-interactivity  { background: rgba(255,220,80,0.15);  color: #ffdc50; border: 1px solid rgba(255,220,80,0.3); }
  .badge-audio          { background: rgba(100,200,255,0.15); color: #64c8ff; border: 1px solid rgba(100,200,255,0.3); }
  .badge-infrastructure { background: rgba(180,180,180,0.15); color: #b4b4b4; border: 1px solid rgba(180,180,180,0.3); }

  .badge-agent {
    background: rgba(80,200,80,0.1); color: rgba(80,200,80,0.7);
    border: 1px solid rgba(80,200,80,0.25);
  }
  .badge-manual {
    background: rgba(212,175,55,0.1); color: rgba(212,175,55,0.7);
    border: 1px solid rgba(212,175,55,0.25);
  }

  /* Timeline */
  .timeline { padding: 24px 0; }

  .iteration {
    position: relative;
    padding: 0 0 0 32px;
    margin-bottom: 2px;
  }
  /* Vertical line */
  .iteration::before {
    content: '';
    position: absolute; left: 11px; top: 0; bottom: 0;
    width: 1px; background: rgba(212,175,55,0.12);
  }
  .iteration:last-child::before { display: none; }

  /* Dot on timeline */
  .iteration::after {
    content: '';
    position: absolute; left: 7px; top: 18px;
    width: 9px; height: 9px; border-radius: 50%;
    background: #0a0a12;
    border: 2px solid rgba(212,175,55,0.4);
  }

  .iteration-card {
    border: 1px solid rgba(212,175,55,0.1);
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .iteration-card:hover { border-color: rgba(212,175,55,0.3); }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 16px 4px;
    gap: 10px; flex-wrap: wrap;
  }
  .card-top-left { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
  .card-top-right { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .card-session {
    font-family: 'Cinzel', serif; font-size: 0.75em;
    color: rgba(212,175,55,0.5); letter-spacing: 0.1em;
  }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 1.05em;
    color: #e8e0d0; letter-spacing: 0.04em;
  }
  .card-timestamp {
    font-size: 0.7em; color: rgba(232,224,208,0.3);
    letter-spacing: 0.05em;
  }

  .card-summary {
    padding: 4px 16px 12px;
    color: rgba(232,224,208,0.55);
    font-size: 0.85em;
  }

  .card-details-toggle {
    display: block; width: 100%;
    padding: 8px 16px;
    border: none; border-top: 1px solid rgba(212,175,55,0.06);
    background: rgba(212,175,55,0.02);
    color: rgba(212,175,55,0.4); font-family: 'DM Mono', monospace;
    font-size: 0.7em; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .card-details-toggle:hover {
    background: rgba(212,175,55,0.05); color: rgba(212,175,55,0.6);
  }

  .card-details {
    display: none;
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(212,175,55,0.06);
  }
  .card-details.open { display: block; }
  .card-details ul { list-style: none; padding: 0; }
  .card-details li {
    padding: 3px 0; font-size: 0.8em;
    color: rgba(232,224,208,0.45);
  }
  .card-details li::before {
    content: '\203A'; color: rgba(212,175,55,0.4);
    margin-right: 8px;
  }
  .lines-stat {
    margin-top: 8px; font-size: 0.7em;
    color: rgba(80,200,80,0.4);
  }

  footer {
    text-align: center; padding: 30px 20px;
    border-top: 1px solid rgba(212,175,55,0.1);
    margin-top: 20px;
    color: rgba(232,224,208,0.25);
    font-size: 0.75em; line-height: 1.8;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.6em; }
    .stats-bar { gap: 16px; }
    .stat .number { font-size: 1.3em; }
    .card-top { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>BACCARAT CITY</h1>
  <div class="subtitle">改進日誌 &middot; Improvement Log</div>
  <div class="meta" id="headerMeta"></div>
  <a href="/" class="back-link">Enter the City</a>
</header>

<div class="container">
  <div class="stats-bar" id="statsBar"></div>
  <div class="domain-legend" id="domainLegend"></div>
  <div class="timeline" id="timeline"></div>
</div>

<footer>
  Baccarat City &mdash; A living digital twin of Macau<br>
  Autonomously improved every hour by Claude Opus 4.6<br>
  <a href="https://baccaratcity.com/data/improvements.json">Raw data (JSON)</a>
</footer>

<script>
(async function() {
  var resp = await fetch('/data/improvements.json');
  var data = await resp.json();

  // Sort sessions: most recent first
  var sessions = data.sessions.slice().sort(function(a, b) {
    if (b.date !== a.date) return b.date.localeCompare(a.date);
    return b.session - a.session;
  });

  // Stats
  var totalSessions = sessions.length;
  var totalLines = sessions.reduce(function(sum, s) { return sum + (s.linesAdded || 0); }, 0);
  var autoCount = sessions.filter(function(s) { return s.agent === 'automated'; }).length;
  var domainSet = {};
  sessions.forEach(function(s) { domainSet[s.domain] = true; });
  var domainCount = Object.keys(domainSet).length;
  var dateSet = {};
  sessions.forEach(function(s) { dateSet[s.date] = true; });
  var dayCount = Object.keys(dateSet).length;

  document.getElementById('statsBar').innerHTML =
    '<div class="stat"><div class="number">' + totalSessions + '</div><div class="label">Iterations</div></div>' +
    '<div class="stat"><div class="number">' + autoCount + '</div><div class="label">Automated</div></div>' +
    '<div class="stat"><div class="number">' + totalLines.toLocaleString() + '</div><div class="label">Lines Added</div></div>' +
    '<div class="stat"><div class="number">' + domainCount + '</div><div class="label">Domains</div></div>' +
    '<div class="stat"><div class="number">' + dayCount + '</div><div class="label">Days Active</div></div>';

  var latestDate = sessions.length > 0 ? sessions[0].date : 'N/A';
  document.getElementById('headerMeta').textContent =
    totalSessions + ' iterations \u00B7 Last updated ' + latestDate;

  // Domain legend
  var legendHtml = '<span class="domain-legend-label">Domains</span>';
  Object.entries(data.domains).forEach(function(entry) {
    var key = entry[0], d = entry[1];
    legendHtml += '<span class="badge badge-' + key + '">' + d.icon + ' ' + d.label + '</span>';
  });
  document.getElementById('domainLegend').innerHTML = legendHtml;

  // Timeline
  var html = '';
  sessions.forEach(function(s, idx) {
    var dom = data.domains[s.domain] || { icon: '?', label: s.domain };
    var agentBadge = s.agent === 'automated'
      ? '<span class="badge badge-agent">auto</span>'
      : '<span class="badge badge-manual">manual</span>';
    var domainBadge = '<span class="badge badge-' + s.domain + '">' + dom.icon + ' ' + dom.label + '</span>';
    var cardId = 'card-' + s.session;

    html += '<div class="iteration">';
    html += '<div class="iteration-card">';

    // Top row: session label + title on left, badges on right
    html += '<div class="card-top">';
    html += '<div class="card-top-left">';
    html += '<div class="card-session">ITERATION #' + s.session + '</div>';
    html += '<div class="card-title">' + s.title + '</div>';
    html += '<div class="card-timestamp">' + s.date + ' \u00B7 Session ' + s.session + '</div>';
    html += '</div>';
    html += '<div class="card-top-right">' + domainBadge + agentBadge + '</div>';
    html += '</div>';

    // Summary
    html += '<div class="card-summary">' + s.summary + '</div>';

    // Details toggle + content
    if (s.details && s.details.length > 0) {
      html += '<button class="card-details-toggle" onclick="var d=document.getElementById(\'' + cardId + '\');d.classList.toggle(\'open\');this.textContent=d.classList.contains(\'open\')?\'Hide details\':\'Show details (' + s.details.length + ')\'">Show details (' + s.details.length + ')</button>';
      html += '<div class="card-details" id="' + cardId + '">';
      html += '<ul>' + s.details.map(function(d) { return '<li>' + d + '</li>'; }).join('') + '</ul>';
      if (s.linesAdded) html += '<div class="lines-stat">+' + s.linesAdded + ' lines of code</div>';
      html += '</div>';
    }

    html += '</div>'; // card
    html += '</div>'; // iteration
  });

  document.getElementById('timeline').innerHTML = html;
})();
</script>
</body>
</html>
