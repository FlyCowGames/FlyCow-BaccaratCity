<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat City - Improvement Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100%;
    background: #0a0a12; color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    font-size: 14px; line-height: 1.6;
  }

  a { color: #d4af37; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Header ── */
  header {
    text-align: center; padding: 40px 20px 30px;
    border-bottom: 1px solid rgba(212,175,55,0.2);
  }
  header h1 {
    font-family: 'Cinzel', serif; font-weight: 900;
    font-size: 2.4em; letter-spacing: 0.15em;
    color: #d4af37;
  }
  header .subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95em; color: rgba(212,175,55,0.6);
    margin-top: 6px; letter-spacing: 0.3em;
  }
  header .meta {
    margin-top: 12px; font-size: 0.85em;
    color: rgba(232,224,208,0.5);
  }
  header .back-link {
    display: inline-block; margin-top: 16px;
    padding: 6px 20px; border: 1px solid rgba(212,175,55,0.4);
    font-family: 'Cinzel', serif; font-size: 0.85em;
    color: #d4af37; transition: all 0.3s;
  }
  header .back-link:hover {
    background: rgba(212,175,55,0.1);
    text-decoration: none;
  }

  /* ── Layout ── */
  .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

  /* ── Day Index ── */
  .day-index {
    padding: 24px 0;
    border-bottom: 1px solid rgba(212,175,55,0.1);
  }
  .day-index h2 {
    font-family: 'Cinzel', serif; font-size: 1.1em;
    color: #d4af37; margin-bottom: 12px;
    letter-spacing: 0.1em;
  }
  .day-links {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .day-link {
    padding: 6px 16px;
    border: 1px solid rgba(212,175,55,0.25);
    font-size: 0.85em; color: #d4af37;
    transition: all 0.2s; cursor: pointer;
  }
  .day-link:hover, .day-link.active {
    background: rgba(212,175,55,0.15);
    text-decoration: none;
  }
  .day-link .count {
    color: rgba(232,224,208,0.4);
    margin-left: 6px;
  }

  /* ── Domain Filter ── */
  .domain-filter {
    padding: 20px 0;
    border-bottom: 1px solid rgba(212,175,55,0.1);
  }
  .domain-filter h3 {
    font-family: 'Cinzel', serif; font-size: 0.9em;
    color: rgba(212,175,55,0.7); margin-bottom: 10px;
    letter-spacing: 0.08em;
  }
  .domain-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .domain-tag {
    padding: 4px 12px;
    border: 1px solid rgba(232,224,208,0.15);
    font-size: 0.8em; color: rgba(232,224,208,0.6);
    cursor: pointer; transition: all 0.2s;
  }
  .domain-tag:hover, .domain-tag.active {
    border-color: #d4af37;
    color: #d4af37;
    background: rgba(212,175,55,0.08);
  }
  .domain-tag .icon { margin-right: 4px; }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex; gap: 30px; padding: 20px 0;
    border-bottom: 1px solid rgba(212,175,55,0.1);
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat .number {
    font-family: 'Cinzel', serif; font-size: 1.8em;
    color: #d4af37; font-weight: 700;
  }
  .stat .label {
    font-size: 0.75em; color: rgba(232,224,208,0.4);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* ── Day Section ── */
  .day-section {
    padding: 30px 0 10px;
  }
  .day-section.hidden { display: none; }
  .day-header {
    font-family: 'Cinzel', serif; font-size: 1.2em;
    color: #d4af37; letter-spacing: 0.1em;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(212,175,55,0.15);
    margin-bottom: 20px;
  }

  /* ── Domain Group ── */
  .domain-group { margin-bottom: 24px; }
  .domain-group-header {
    font-family: 'Cinzel', serif; font-size: 0.95em;
    color: rgba(212,175,55,0.8); margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  /* ── Session Card ── */
  .session-card {
    border: 1px solid rgba(212,175,55,0.12);
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .session-card:hover {
    border-color: rgba(212,175,55,0.35);
  }
  .session-card.hidden { display: none; }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    background: rgba(212,175,55,0.03);
  }
  .card-header:hover { background: rgba(212,175,55,0.06); }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 0.95em;
    color: #e8e0d0;
  }
  .card-badges {
    display: flex; gap: 8px; align-items: center;
  }
  .badge {
    padding: 2px 8px; font-size: 0.7em;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .badge-session {
    border: 1px solid rgba(212,175,55,0.3);
    color: #d4af37;
  }
  .badge-agent {
    border: 1px solid rgba(100,200,100,0.3);
    color: rgba(100,200,100,0.8);
  }
  .badge-manual {
    border: 1px solid rgba(200,150,100,0.3);
    color: rgba(200,150,100,0.8);
  }
  .card-summary {
    padding: 0 16px 12px;
    color: rgba(232,224,208,0.6);
    font-size: 0.88em;
  }
  .card-details {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid rgba(212,175,55,0.08);
  }
  .card-details.open { display: block; padding-top: 12px; }
  .card-details ul {
    list-style: none; padding: 0;
  }
  .card-details li {
    padding: 3px 0; font-size: 0.82em;
    color: rgba(232,224,208,0.5);
  }
  .card-details li::before {
    content: '›'; color: #d4af37;
    margin-right: 8px;
  }
  .lines-added {
    font-size: 0.75em; color: rgba(100,200,100,0.5);
    margin-top: 8px;
  }

  /* ── Footer ── */
  footer {
    text-align: center; padding: 30px 20px;
    border-top: 1px solid rgba(212,175,55,0.1);
    margin-top: 20px;
    color: rgba(232,224,208,0.3);
    font-size: 0.8em;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header h1 { font-size: 1.6em; }
    .stats-bar { gap: 16px; }
    .stat .number { font-size: 1.3em; }
  }
</style>
</head>
<body>

<header>
  <h1>BACCARAT CITY</h1>
  <div class="subtitle">改進日誌 · Improvement Log</div>
  <div class="meta" id="headerMeta"></div>
  <a href="/" class="back-link">Enter the City</a>
</header>

<div class="container">
  <div class="stats-bar" id="statsBar"></div>
  <div class="day-index" id="dayIndex"></div>
  <div class="domain-filter" id="domainFilter"></div>
  <div id="content"></div>
</div>

<footer>
  Baccarat City — A living digital twin of Macau<br>
  Autonomously improved every hour by Claude Opus 4.6
</footer>

<script>
(async function() {
  const resp = await fetch('/data/improvements.json');
  const data = await resp.json();

  // ── Group sessions by date ──
  const byDate = {};
  data.sessions.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });
  const dates = Object.keys(byDate).sort().reverse();

  // ── Stats ──
  const totalSessions = data.sessions.length;
  const totalLines = data.sessions.reduce((sum, s) => sum + (s.linesAdded || 0), 0);
  const domainsUsed = new Set(data.sessions.map(s => s.domain)).size;
  const autoSessions = data.sessions.filter(s => s.agent === 'automated').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="number">${totalSessions}</div><div class="label">Sessions</div></div>
    <div class="stat"><div class="number">${autoSessions}</div><div class="label">Automated</div></div>
    <div class="stat"><div class="number">${totalLines.toLocaleString()}</div><div class="label">Lines Added</div></div>
    <div class="stat"><div class="number">${domainsUsed}</div><div class="label">Domains</div></div>
    <div class="stat"><div class="number">${dates.length}</div><div class="label">Days Active</div></div>
  `;

  document.getElementById('headerMeta').textContent =
    `${totalSessions} improvements across ${dates.length} day${dates.length > 1 ? 's' : ''} — Last updated: ${dates[0]}`;

  // ── Day Index ──
  let dayIndexHtml = '<h2>Daily Index</h2><div class="day-links">';
  dates.forEach((date, i) => {
    const count = byDate[date].length;
    dayIndexHtml += `<a class="day-link${i === 0 ? ' active' : ''}" data-date="${date}" href="#day-${date}">${date}<span class="count">(${count})</span></a>`;
  });
  dayIndexHtml += '</div>';
  document.getElementById('dayIndex').innerHTML = dayIndexHtml;

  // ── Domain Filter ──
  let filterHtml = '<h3>Filter by Domain</h3><div class="domain-tags">';
  filterHtml += '<span class="domain-tag active" data-domain="all">All</span>';
  Object.entries(data.domains).forEach(([key, d]) => {
    filterHtml += `<span class="domain-tag" data-domain="${key}"><span class="icon">${d.icon}</span>${d.label}</span>`;
  });
  filterHtml += '</div>';
  document.getElementById('domainFilter').innerHTML = filterHtml;

  // ── Render content ──
  function renderContent(filterDate, filterDomain) {
    let html = '';
    const datesToShow = filterDate === 'all' ? dates : [filterDate];

    datesToShow.forEach(date => {
      let sessions = byDate[date];
      if (filterDomain !== 'all') {
        sessions = sessions.filter(s => s.domain === filterDomain);
      }
      if (sessions.length === 0) return;

      // Group by domain within this day
      const byDomain = {};
      sessions.forEach(s => {
        if (!byDomain[s.domain]) byDomain[s.domain] = [];
        byDomain[s.domain].push(s);
      });

      html += `<div class="day-section" id="day-${date}">`;
      html += `<div class="day-header">${date} — ${sessions.length} improvement${sessions.length > 1 ? 's' : ''}</div>`;

      Object.entries(byDomain).forEach(([domKey, domSessions]) => {
        const dom = data.domains[domKey] || { icon: '?', label: domKey };
        html += `<div class="domain-group">`;
        html += `<div class="domain-group-header">${dom.icon} ${dom.label}</div>`;

        domSessions.forEach(s => {
          const agentClass = s.agent === 'automated' ? 'badge-agent' : 'badge-manual';
          const agentLabel = s.agent === 'automated' ? 'auto' : 'manual';
          html += `
            <div class="session-card" data-domain="${s.domain}" data-session="${s.session}">
              <div class="card-header" onclick="this.parentElement.querySelector('.card-details').classList.toggle('open')">
                <span class="card-title">${s.title}</span>
                <div class="card-badges">
                  <span class="badge badge-session">#${s.session}</span>
                  <span class="badge ${agentClass}">${agentLabel}</span>
                </div>
              </div>
              <div class="card-summary">${s.summary}</div>
              <div class="card-details">
                <ul>${s.details.map(d => `<li>${d}</li>`).join('')}</ul>
                ${s.linesAdded ? `<div class="lines-added">+${s.linesAdded} lines</div>` : ''}
              </div>
            </div>`;
        });

        html += '</div>';
      });

      html += '</div>';
    });

    document.getElementById('content').innerHTML = html || '<p style="padding:40px 0;color:rgba(232,224,208,0.3);text-align:center;">No improvements match this filter.</p>';
  }

  // ── Initial render (latest day) ──
  renderContent(dates[0], 'all');

  // ── Day index clicks ──
  document.querySelectorAll('.day-link').forEach(el => {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelectorAll('.day-link').forEach(l => l.classList.remove('active'));
      this.classList.add('active');
      const activeDomain = document.querySelector('.domain-tag.active')?.dataset.domain || 'all';
      renderContent(this.dataset.date, activeDomain);
    });
  });

  // ── Domain filter clicks ──
  document.querySelectorAll('.domain-tag').forEach(el => {
    el.addEventListener('click', function() {
      document.querySelectorAll('.domain-tag').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      const activeDate = document.querySelector('.day-link.active')?.dataset.date || dates[0];
      renderContent(activeDate, this.dataset.domain);
    });
  });
})();
</script>
</body>
</html>
