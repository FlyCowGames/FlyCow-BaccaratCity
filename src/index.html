<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat City - Macau</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }

  #cesiumContainer {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
  }

  /* Hide default Cesium branding */
  .cesium-viewer-bottom, .cesium-viewer-fullscreenContainer { display: none !important; }
  .cesium-credit-logoContainer { display: none !important; }
  .cesium-viewer-creditDisplay { display: none !important; }

  /* ── Overlays ── */
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100;
    font-family: 'Cinzel', serif;
  }

  /* Title block */
  #title-block {
    position: absolute; top: 0; left: 0; width: 100%;
    text-align: center; padding-top: 32px;
    background: linear-gradient(180deg, rgba(10,10,18,0.85) 0%, rgba(10,10,18,0.4) 60%, transparent 100%);
    padding-bottom: 48px;
  }
  #title {
    font-family: 'Cinzel', serif;
    font-weight: 900; font-size: clamp(2rem, 5vw, 4.5rem);
    letter-spacing: 0.35em;
    background: linear-gradient(135deg, #d4af37 0%, #f5e6a3 30%, #d4af37 50%, #a67c00 70%, #d4af37 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: goldShimmer 4s ease-in-out infinite;
    text-shadow: none;
    filter: drop-shadow(0 2px 12px rgba(212,175,55,0.4));
  }
  @keyframes goldShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  #tagline {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300; font-size: clamp(0.9rem, 2vw, 1.5rem);
    color: rgba(212,175,55,0.7);
    letter-spacing: 0.5em;
    margin-top: 8px;
  }
  #subtitle {
    font-family: 'DM Mono', monospace;
    font-weight: 300; font-size: clamp(0.65rem, 1vw, 0.85rem);
    color: rgba(212,175,55,0.35);
    letter-spacing: 0.3em; text-transform: uppercase;
    margin-top: 12px;
  }

  /* Decorative line under title */
  #title-line {
    width: 120px; height: 1px; margin: 16px auto 0;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
  }

  /* Clock - bottom right */
  #clock-block {
    position: absolute; bottom: 28px; right: 32px;
    text-align: right;
  }
  #clock-label {
    font-family: 'DM Mono', monospace; font-weight: 300;
    font-size: 0.65rem; color: rgba(212,175,55,0.4);
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  #clock {
    font-family: 'DM Mono', monospace; font-weight: 400;
    font-size: 1.4rem; color: #d4af37;
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px rgba(212,175,55,0.3);
  }

  /* Hints - bottom left */
  #hints {
    position: absolute; bottom: 32px; left: 32px;
    font-family: 'DM Mono', monospace; font-weight: 300;
    font-size: 0.7rem; color: rgba(255,255,255,0.25);
    letter-spacing: 0.1em; line-height: 1.8;
  }

  /* Replay button */
  #replay-btn {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    pointer-events: auto; cursor: pointer;
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: #d4af37; background: rgba(10,10,18,0.7);
    border: 1px solid rgba(212,175,55,0.3);
    padding: 10px 28px; border-radius: 2px;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
    opacity: 0; visibility: hidden;
  }
  #replay-btn:hover {
    background: rgba(212,175,55,0.15);
    border-color: #d4af37;
    box-shadow: 0 0 20px rgba(212,175,55,0.2);
  }
  #replay-btn.visible { opacity: 1; visibility: visible; }

  /* Flythrough stage indicator */
  #stage-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif; font-weight: 400;
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: rgba(212,175,55,0.6);
    letter-spacing: 0.3em; text-transform: uppercase;
    opacity: 0; transition: opacity 1s ease;
    text-align: center;
  }
  #stage-label.show { opacity: 1; }

  /* Vignette */
  #vignette {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(10,10,18,0.6) 100%);
    pointer-events: none;
  }

  /* Loading screen */
  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a12; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.5s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  #loading-title {
    font-family: 'Cinzel', serif; font-weight: 900;
    font-size: 2.5rem; letter-spacing: 0.4em;
    color: #d4af37;
  }
  #loading-bar-bg {
    width: 200px; height: 2px; background: rgba(212,175,55,0.15);
    margin-top: 32px; border-radius: 1px; overflow: hidden;
  }
  #loading-bar {
    width: 0%; height: 100%; background: #d4af37;
    transition: width 0.3s ease;
  }
  #loading-text {
    font-family: 'DM Mono', monospace; font-weight: 300;
    font-size: 0.7rem; color: rgba(212,175,55,0.4);
    letter-spacing: 0.15em; margin-top: 16px;
  }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-title">BACCARAT CITY</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div id="loading-text">Loading Macau 3D Tiles...</div>
</div>

<div id="cesiumContainer"></div>

<div id="overlay">
  <div id="vignette"></div>

  <div id="title-block">
    <div id="title">BACCARAT CITY</div>
    <div id="tagline">百家樂之城 &middot; 澳門風雲</div>
    <div id="subtitle">Photorealistic Macau &middot; Real-Time Day &amp; Night</div>
    <div id="title-line"></div>
  </div>

  <div id="stage-label"></div>

  <div id="clock-block">
    <div id="clock-label">Macau Time (UTC+8)</div>
    <div id="clock"></div>
  </div>

  <div id="hints">
    scroll to zoom &middot; drag to orbit<br>
    click landmark to fly there
  </div>

  <button id="replay-btn">&#9654; Replay Flythrough</button>
</div>

<script>
// ── Config ──
const GOOGLE_API_KEY = 'AIzaSyDLUCBB9ag1xe7fly45yY5ubvEkx8xUDXU';
const TILES_URL = 'https://tile.googleapis.com/v1/3dtiles/root.json?key=' + GOOGLE_API_KEY;

// Macau center
const MACAU_LAT = 22.1987;
const MACAU_LON = 113.5439;

// Landmarks
const LANDMARKS = [
  { name: "Grand Lisboa",        chinese: "\u65B0\u8461\u4EAC",     emoji: "\uD83C\uDFB0",       lat: 22.1893, lon: 113.5390 },
  { name: "The Venetian",        chinese: "\u5A01\u5C3C\u65AF\u4EBA", emoji: "\uD83C\uDFB0",     lat: 22.1494, lon: 113.5590 },
  { name: "Macau Tower",         chinese: "\u6FB3\u9580\u65C5\u904A\u5854", emoji: "\uD83D\uDDFC", lat: 22.1801, lon: 113.5318 },
  { name: "Ruins of St. Paul's", chinese: "\u5927\u4E09\u5DF4",     emoji: "\uD83C\uDFDB\uFE0F", lat: 22.1974, lon: 113.5410 },
  { name: "Galaxy Macau",        chinese: "\u9280\u6CB3",           emoji: "\uD83C\uDFB0",       lat: 22.1487, lon: 113.5544 },
  { name: "Wynn Palace",         chinese: "\u6C38\u5229\u7687\u5BAE", emoji: "\uD83C\uDFB0",     lat: 22.1478, lon: 113.5630 },
  { name: "A-Ma Temple",         chinese: "\u5ABD\u95A3\u5EDF",     emoji: "\u26E9\uFE0F",       lat: 22.1868, lon: 113.5311 },
  { name: "City of Dreams",      chinese: "\u65B0\u6FE0\u5929\u5730", emoji: "\uD83C\uDFB0",     lat: 22.1486, lon: 113.5586 },
];

// ── Clock & Day/Night UI ──
function getMacauHour() {
  var now = new Date();
  var macauStr = now.toLocaleString('en-US', { timeZone: 'Asia/Macau', hour12: false });
  var macau = new Date(macauStr);
  return macau.getHours() + macau.getMinutes() / 60;
}

function updateClock() {
  var now = new Date();
  var macauStr = now.toLocaleString('en-US', { timeZone: 'Asia/Macau', hour12: false });
  var macau = new Date(macauStr);
  var h = String(macau.getHours()).padStart(2, '0');
  var m = String(macau.getMinutes()).padStart(2, '0');
  var s = String(macau.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;

  // Update day/night indicator
  var hour = getMacauHour();
  var isNight = hour < 6.5 || hour > 18.5;
  var isDusk = (hour >= 17.5 && hour <= 18.5) || (hour >= 6 && hour <= 7);
  var label = isNight ? 'Macau Time (UTC+8) \u00B7 Night' :
              isDusk ? 'Macau Time (UTC+8) \u00B7 Golden Hour' :
              'Macau Time (UTC+8) \u00B7 Day';
  document.getElementById('clock-label').textContent = label;
}
setInterval(updateClock, 1000);
updateClock();

// ── Loading bar ──
var loadProgress = 0;
var loadInterval = setInterval(function() {
  loadProgress = Math.min(loadProgress + Math.random() * 12, 90);
  document.getElementById('loading-bar').style.width = loadProgress + '%';
}, 400);

// ── Cesium Setup ──
Cesium.Ion.defaultAccessToken = '';

var _viewer = null;
var flythroughRunning = false;
var orbitHandle = null;

async function init() {
  var viewer = new Cesium.Viewer('cesiumContainer', {
    timeline: false,
    animation: false,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    fullscreenButton: false,
    infoBox: false,
    selectionIndicator: false,
    imageryProvider: false,
    requestRenderMode: false,
    shouldAnimate: true,
  });

  // Scene setup — no globe (3D Tiles replace it), atmosphere + sun/moon for day/night
  viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0a0a12');
  viewer.scene.globe.show = false;
  viewer.scene.skyBox.show = false;
  viewer.scene.skyAtmosphere.show = true;
  viewer.scene.sun.show = true;
  viewer.scene.moon.show = true;
  viewer.scene.fog.enabled = false;

  // Real-time clock — scene matches actual Macau time
  viewer.clock.currentTime = Cesium.JulianDate.now();
  viewer.clock.shouldAnimate = true;
  viewer.clock.multiplier = 1; // real-time (1x speed)

  // Lighting — use sun position for natural day/night
  viewer.scene.globe.enableLighting = true;
  viewer.scene.light = new Cesium.SunLight({ intensity: 2.0 });

  // Initial camera position while loading
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(MACAU_LON, MACAU_LAT, 3500),
    orientation: {
      heading: Cesium.Math.toRadians(20),
      pitch: Cesium.Math.toRadians(-60),
      roll: 0.0,
    },
  });

  // Load Google 3D Tiles
  try {
    var tileset = await Cesium.Cesium3DTileset.fromUrl(TILES_URL, {
      maximumScreenSpaceError: 8,
      maximumMemoryUsage: 2048,
    });
    viewer.scene.primitives.add(tileset);

    // Finish loading screen
    clearInterval(loadInterval);
    document.getElementById('loading-bar').style.width = '100%';
    setTimeout(function() {
      document.getElementById('loading').classList.add('fade');
      setTimeout(function() { document.getElementById('loading').style.display = 'none'; }, 1600);
    }, 600);

    _viewer = viewer;

    // Add landmarks
    addLandmarks(viewer);

    // Start flythrough
    runFlythrough(viewer);

    // Double-click to fly to point
    var dblClickHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    dblClickHandler.setInputAction(function(click) {
      var picked = viewer.scene.pickPosition(click.position);
      if (Cesium.defined(picked)) {
        var carto = Cesium.Cartographic.fromCartesian(picked);
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, 300),
          orientation: {
            heading: viewer.camera.heading,
            pitch: Cesium.Math.toRadians(-40),
            roll: 0.0,
          },
          duration: 2.5,
          easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
        });
      }
    }, Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

  } catch (error) {
    console.error('Failed to load 3D Tiles:', error);
    document.getElementById('loading-text').textContent = 'Error loading tiles: ' + error.message;
    document.getElementById('loading-bar').style.background = '#ff4444';
  }
}

// ── Landmarks ──
function addLandmarks(viewer) {
  LANDMARKS.forEach(function(lm) {
    viewer.entities.add({
      name: lm.name,
      position: Cesium.Cartesian3.fromDegrees(lm.lon, lm.lat, 80),
      billboard: {
        image: createLandmarkCanvas(lm),
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
        scaleByDistance: new Cesium.NearFarScalar(300, 1.0, 12000, 0.25),
        translucencyByDistance: new Cesium.NearFarScalar(300, 1.0, 25000, 0.3),
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
      },
      properties: { lmData: lm },
    });
  });

  // Click landmark to fly
  var clickHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  clickHandler.setInputAction(function(click) {
    var picked = viewer.scene.pick(click.position);
    if (Cesium.defined(picked) && Cesium.defined(picked.id) && picked.id.properties) {
      try {
        var lm = picked.id.properties.lmData.getValue();
        if (lm && lm.lat) {
          stopOrbit(viewer);
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lm.lon, lm.lat, 350),
            orientation: {
              heading: Cesium.Math.toRadians(30),
              pitch: Cesium.Math.toRadians(-35),
              roll: 0.0,
            },
            duration: 2.5,
            easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
          });
        }
      } catch(e) { /* ignore non-landmark clicks */ }
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
}

function createLandmarkCanvas(lm) {
  var canvas = document.createElement('canvas');
  var w = 340, h = 110;
  canvas.width = w;
  canvas.height = h;
  var ctx = canvas.getContext('2d');

  // Background pill
  ctx.fillStyle = 'rgba(10, 10, 18, 0.88)';
  roundRect(ctx, 0, 0, w, h - 18, 8);
  ctx.fill();

  // Gold border
  ctx.strokeStyle = 'rgba(212, 175, 55, 0.6)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 0, 0, w, h - 18, 8);
  ctx.stroke();

  // Gold accent line at top
  var grad = ctx.createLinearGradient(12, 0, 60, 0);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(0.3, '#d4af37');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(10, 0, 50, 2);

  // Inner glow
  ctx.shadowColor = 'rgba(212, 175, 55, 0.08)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // Emoji
  ctx.shadowBlur = 0;
  ctx.font = '24px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(lm.emoji, 14, 38);

  // English name
  ctx.fillStyle = '#d4af37';
  ctx.font = 'bold 17px sans-serif';
  ctx.fillText(lm.name, 48, 36);

  // Chinese name
  ctx.fillStyle = 'rgba(212, 175, 55, 0.55)';
  ctx.font = '15px sans-serif';
  ctx.fillText(lm.chinese, 48, 60);

  // Thin separator
  ctx.strokeStyle = 'rgba(212, 175, 55, 0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(14, 72);
  ctx.lineTo(w - 14, 72);
  ctx.stroke();

  // Coordinates
  ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
  ctx.font = '10px monospace';
  ctx.fillText(lm.lat.toFixed(4) + '\u00B0N  ' + lm.lon.toFixed(4) + '\u00B0E', 14, 86);

  // Pointer triangle
  ctx.fillStyle = 'rgba(10, 10, 18, 0.88)';
  ctx.beginPath();
  ctx.moveTo(w/2 - 10, h - 18);
  ctx.lineTo(w/2, h);
  ctx.lineTo(w/2 + 10, h - 18);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(212, 175, 55, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(w/2 - 10, h - 18);
  ctx.lineTo(w/2, h);
  ctx.lineTo(w/2 + 10, h - 18);
  ctx.stroke();

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Stage Label ──
function showStageLabel(text, duration) {
  var el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, duration || 3000);
}

// ── Sleep helper ──
function sleep(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

// ── Flythrough ──
async function runFlythrough(viewer) {
  if (flythroughRunning) return;
  flythroughRunning = true;
  stopOrbit(viewer);

  document.getElementById('replay-btn').classList.remove('visible');
  viewer.scene.screenSpaceCameraController.enableInputs = false;

  // Stage 1: Bird's eye of all Macau
  showStageLabel('MACAU SKYLINE', 4500);
  await flyCamera(viewer, {
    lon: 113.5439, lat: 22.1987, alt: 3200,
    heading: 20, pitch: -60, duration: 5
  });
  await sleep(300);

  // Stage 2: Sweep toward Cotai Strip
  showStageLabel('COTAI STRIP', 4500);
  await flyCamera(viewer, {
    lon: 113.5570, lat: 22.1510, alt: 800,
    heading: -20, pitch: -30, duration: 5
  });
  await sleep(300);

  // Stage 3a: Street-level near Venetian
  showStageLabel('THE VENETIAN \u00B7 CITY OF DREAMS \u00B7 GALAXY', 6000);
  await flyCamera(viewer, {
    lon: 113.5595, lat: 22.1500, alt: 180,
    heading: 65, pitch: -12, duration: 3.5
  });

  // Stage 3b: Past City of Dreams to Galaxy
  await flyCamera(viewer, {
    lon: 113.5544, lat: 22.1490, alt: 220,
    heading: 130, pitch: -10, duration: 3
  });

  // Stage 3c: Sweep past Wynn Palace
  showStageLabel('WYNN PALACE', 3000);
  await flyCamera(viewer, {
    lon: 113.5635, lat: 22.1480, alt: 200,
    heading: 210, pitch: -15, duration: 3.5
  });
  await sleep(300);

  // Stage 4: Rise and orbit Grand Lisboa
  showStageLabel('GRAND LISBOA', 5000);
  await flyCamera(viewer, {
    lon: 113.5410, lat: 22.1900, alt: 500,
    heading: 0, pitch: -25, duration: 4
  });
  await flyCamera(viewer, {
    lon: 113.5365, lat: 22.1878, alt: 380,
    heading: 180, pitch: -20, duration: 4
  });
  await sleep(300);

  // Stage 5: Settle into casino district overview
  showStageLabel('BACCARAT CITY', 4500);
  await flyCamera(viewer, {
    lon: 113.5500, lat: 22.1700, alt: 1500,
    heading: 30, pitch: -35, duration: 4
  });

  // Done - enable controls, show replay
  viewer.scene.screenSpaceCameraController.enableInputs = true;
  flythroughRunning = false;
  document.getElementById('replay-btn').classList.add('visible');

  // Start slow orbit
  startOrbit(viewer);
}

function flyCamera(viewer, opts) {
  return new Promise(function(resolve) {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(opts.lon, opts.lat, opts.alt),
      orientation: {
        heading: Cesium.Math.toRadians(opts.heading),
        pitch: Cesium.Math.toRadians(opts.pitch),
        roll: 0.0,
      },
      duration: opts.duration,
      easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT,
      complete: resolve,
      cancel: resolve,
    });
  });
}

// ── Continuous Orbit ──
function startOrbit(viewer) {
  stopOrbit(viewer);

  var angle = Cesium.Math.toRadians(30);
  var speed = 0.0004;
  var centerLon = 113.5500;
  var centerLat = 22.1650;
  var radius = 1600;
  var lonRadius = 0.014;
  var latRadius = 0.009;

  orbitHandle = function() {
    if (flythroughRunning) return;

    angle += speed;
    if (angle > Cesium.Math.TWO_PI) angle -= Cesium.Math.TWO_PI;

    var camLon = centerLon + Math.cos(angle) * lonRadius;
    var camLat = centerLat + Math.sin(angle) * latRadius;

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(camLon, camLat, radius),
      orientation: {
        heading: angle + Math.PI,
        pitch: Cesium.Math.toRadians(-30),
        roll: 0.0,
      },
    });
  };

  viewer.clock.shouldAnimate = true;
  viewer.clock.onTick.addEventListener(orbitHandle);

  // Stop orbit on user interaction
  var canvas = viewer.scene.canvas;
  function onInteract() {
    stopOrbit(viewer);
    canvas.removeEventListener('pointerdown', onInteract);
    canvas.removeEventListener('wheel', onInteract);
  }
  canvas.addEventListener('pointerdown', onInteract);
  canvas.addEventListener('wheel', onInteract);
}

function stopOrbit(viewer) {
  if (orbitHandle && viewer) {
    viewer.clock.onTick.removeEventListener(orbitHandle);
    orbitHandle = null;
  }
}

// ── Replay button ──
document.getElementById('replay-btn').addEventListener('click', function() {
  if (_viewer && !flythroughRunning) {
    runFlythrough(_viewer);
  }
});

// ── Initialize ──
init();
</script>
</body>
</html>
