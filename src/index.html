<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
// === ES MODULE IMPORTS ===
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ── Constants ────────────────────────────────────────────────
const GOLD = 0xd4af37;
const DARK = 0x0a0a12;
const WORLD_SIZE = 200;            // city spans ~200x200 units
const FRUSTUM_BASE = 120;          // half-frustum at default zoom
const ZOOM_MIN = 30;
const ZOOM_MAX = 300;
const ZOOM_SPEED = 0.08;
const PAN_SPEED = 0.35;
const DAMP_FACTOR = 0.08;          // smooth-damp lerp factor

// ── State ────────────────────────────────────────────────────
let scene, camera, renderer, composer;
let clock;
let frustumHalf = FRUSTUM_BASE;
let aspect = 1;

// Smooth-damped values
const cameraTarget = new THREE.Vector3(0, 0, 0);   // where we want to look
const cameraOffset = new THREE.Vector3();            // current pan offset
const panVelocity = new THREE.Vector2(0, 0);
let zoomTarget = FRUSTUM_BASE;

// Input tracking
const pointer = { down: false, button: -1, x: 0, y: 0 };

// Module registry
const modules = [];

// ── Scene ────────────────────────────────────────────────────
function createScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(DARK);
    scene.fog = new THREE.FogExp2(DARK, 0.003);

    // Ambient base light — cool blue tint
    const ambient = new THREE.AmbientLight(0x223355, 0.6);
    scene.add(ambient);

    // Key light — warm directional from upper-left
    const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    keyLight.position.set(-80, 150, 60);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.left = -WORLD_SIZE * 0.6;
    keyLight.shadow.camera.right = WORLD_SIZE * 0.6;
    keyLight.shadow.camera.top = WORLD_SIZE * 0.6;
    keyLight.shadow.camera.bottom = -WORLD_SIZE * 0.6;
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 400;
    keyLight.shadow.bias = -0.001;
    scene.add(keyLight);

    // Fill light — subtle from opposite side
    const fillLight = new THREE.DirectionalLight(0x8899cc, 0.4);
    fillLight.position.set(60, 80, -40);
    scene.add(fillLight);

    // Hemisphere sky/ground light
    const hemiLight = new THREE.HemisphereLight(0x1a1a2e, 0x0a0a0a, 0.3);
    scene.add(hemiLight);

    return scene;
}

// ── Camera (true isometric) ──────────────────────────────────
function createCamera() {
    aspect = window.innerWidth / window.innerHeight;

    camera = new THREE.OrthographicCamera(
        -frustumHalf * aspect, frustumHalf * aspect,
        frustumHalf, -frustumHalf,
        0.1, 1000
    );

    // True isometric rotation
    // Rotate around Y by -45 deg, then tilt down by arctan(1/sqrt(2)) ~ 35.264 deg
    camera.rotation.order = 'YXZ';
    camera.rotateY(-Math.PI / 4);
    camera.rotateX(-Math.atan(1 / Math.sqrt(2)));

    // Position camera far enough along the isometric viewing direction
    // so the entire scene fits within the near/far planes.
    const isoDistance = 200;
    const dir = new THREE.Vector3(1, 1, 1).normalize().multiplyScalar(isoDistance);
    camera.position.copy(dir);

    camera.updateProjectionMatrix();
    return camera;
}

// ── Renderer ─────────────────────────────────────────────────
function createRenderer(container) {
    renderer = new THREE.WebGLRenderer({
        antialias: true,
        powerPreference: 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    container.appendChild(renderer.domElement);
    renderer.domElement.style.display = 'block';

    return renderer;
}

// ── Post-Processing ──────────────────────────────────────────
function createPostProcessing() {
    const size = new THREE.Vector2(window.innerWidth, window.innerHeight);

    composer = new EffectComposer(renderer);

    // 1. Render pass — draws the scene normally
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // 2. Bloom pass — neon glow on bright emissive surfaces
    const bloomPass = new UnrealBloomPass(size, 0.5, 0.4, 0.85);
    // strength=0.5, radius=0.4, threshold=0.85
    composer.addPass(bloomPass);

    // 3. Output pass — tone mapping + color space conversion
    const outputPass = new OutputPass();
    composer.addPass(outputPass);

    // Store reference for resize
    composer.bloomPass = bloomPass;

    return composer;
}

// ── Resize Handler ───────────────────────────────────────────
function onResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    aspect = w / h;

    camera.left = -frustumHalf * aspect;
    camera.right = frustumHalf * aspect;
    camera.top = frustumHalf;
    camera.bottom = -frustumHalf;
    camera.updateProjectionMatrix();

    renderer.setSize(w, h);
    composer.setSize(w, h);
}

// ── Input: Pan & Zoom ────────────────────────────────────────

// Convert screen-space drag delta into world-space pan.
// For an isometric camera the screen X maps to a combination
// of world X and Z, and screen Y maps to all three axes.
function screenToWorldPan(dx, dy) {
    // Build right & up vectors in world space from camera orientation
    const right = new THREE.Vector3();
    const up = new THREE.Vector3();
    camera.getWorldDirection(new THREE.Vector3()); // just to ensure matrixWorld is current
    right.setFromMatrixColumn(camera.matrixWorld, 0); // camera right
    up.setFromMatrixColumn(camera.matrixWorld, 1);    // camera up

    // Scale by current frustum so pan speed feels consistent across zoom levels
    const scale = (frustumHalf * 2) / window.innerHeight * PAN_SPEED;

    const pan = new THREE.Vector3();
    pan.addScaledVector(right, -dx * scale);
    pan.addScaledVector(up, dy * scale);
    return pan;
}

function onPointerDown(e) {
    pointer.down = true;
    pointer.button = e.button;
    pointer.x = e.clientX;
    pointer.y = e.clientY;
}

function onPointerMove(e) {
    if (!pointer.down) return;

    const dx = e.clientX - pointer.x;
    const dy = e.clientY - pointer.y;
    pointer.x = e.clientX;
    pointer.y = e.clientY;

    // Left-button or middle-button drag to pan
    if (pointer.button === 0 || pointer.button === 1) {
        const pan = screenToWorldPan(dx, dy);
        cameraOffset.add(pan);
    }
}

function onPointerUp() {
    pointer.down = false;
    pointer.button = -1;
}

function onWheel(e) {
    e.preventDefault();
    const delta = Math.sign(e.deltaY);
    zoomTarget *= (1 + delta * ZOOM_SPEED);
    zoomTarget = THREE.MathUtils.clamp(zoomTarget, ZOOM_MIN, ZOOM_MAX);
}

function onContextMenu(e) {
    e.preventDefault(); // suppress right-click menu on canvas
}

function bindInput(domElement) {
    domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    domElement.addEventListener('wheel', onWheel, { passive: false });
    domElement.addEventListener('contextmenu', onContextMenu);
}

// ── Animation Loop ───────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Smooth-damp zoom
    frustumHalf = THREE.MathUtils.lerp(frustumHalf, zoomTarget, DAMP_FACTOR);
    camera.left = -frustumHalf * aspect;
    camera.right = frustumHalf * aspect;
    camera.top = frustumHalf;
    camera.bottom = -frustumHalf;
    camera.updateProjectionMatrix();

    // Smooth-damp pan — lerp camera position toward target + offset
    const desiredPos = cameraTarget.clone().add(cameraOffset);
    // Keep the isometric "height" vector constant; only shift the base
    const isoDistance = 200;
    const isoDir = new THREE.Vector3(1, 1, 1).normalize().multiplyScalar(isoDistance);
    const goalPos = desiredPos.clone().add(isoDir);

    camera.position.lerp(goalPos, DAMP_FACTOR);

    // Dispatch module updates
    for (let i = 0; i < modules.length; i++) {
        const mod = modules[i];
        if (mod.update) {
            mod.update(delta, elapsed);
        }
    }

    // Render via post-processing pipeline
    composer.render(delta);
}

// ── Module Registration ──────────────────────────────────────
function registerModule(mod) {
    if (!mod) return;
    modules.push(mod);
    // If already booted, call init immediately
    if (scene && mod.init) {
        mod.init({ scene, camera, renderer, THREE });
    }
}

// ── Boot ─────────────────────────────────────────────────────
function boot(container) {
    if (!container) {
        container = document.body;
    }

    clock = new THREE.Clock();

    createScene();
    createCamera();
    createRenderer(container);
    createPostProcessing();
    bindInput(renderer.domElement);

    window.addEventListener('resize', onResize);

    // Initialize any modules that were registered before boot
    for (let i = 0; i < modules.length; i++) {
        const mod = modules[i];
        if (mod.init) {
            mod.init({ scene, camera, renderer, THREE });
        }
    }

    // Start the loop
    animate();

    console.log(
        '%c Baccarat City %c Core Engine Online ',
        'background:#d4af37;color:#0a0a12;font-weight:bold;padding:2px 6px;border-radius:3px 0 0 3px;',
        'background:#0a0a12;color:#d4af37;font-weight:bold;padding:2px 6px;border-radius:0 3px 3px 0;'
    );
}

// ── Global Namespace ─────────────────────────────────────────
// Expose everything other modules need on window.BACCARAT
window.BACCARAT = window.BACCARAT || {};
Object.assign(window.BACCARAT, {
    // Will be populated after boot()
    get scene() { return scene; },
    get camera() { return camera; },
    get renderer() { return renderer; },
    get composer() { return composer; },
    THREE,
    registerModule,
    boot,
    // Palette constants for other modules
    GOLD,
    DARK,
    WORLD_SIZE,
});

// ── Auto-boot on DOMContentLoaded if a container exists ──────
// Other scripts can call window.BACCARAT.boot(el) manually,
// or rely on this auto-boot which targets #baccarat-city or body.
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('baccarat-city') || document.body;
        boot(el);
    });
} else {
    // DOM already ready (script loaded with defer or at bottom)
    const el = document.getElementById('baccarat-city') || document.body;
    boot(el);
}

// === CITY GEOMETRY ===
// ============================================================
// Baccarat City — City Geometry: Buildings + Roads
// ============================================================
// Dense Macau-inspired cityscape with procedural low-poly
// buildings, road network, and ground plane. All geometry uses
// MeshToonMaterial for cel-shaded aesthetic. Neon signs use
// MeshBasicMaterial for bloom glow.
// ============================================================

(function () {
    'use strict';

    // ── Palette ──────────────────────────────────────────────
    const GOLD      = 0xd4af37;
    const DARK      = 0x0a0a12;
    const ASPHALT   = 0x1a1a22;
    const ROAD      = 0x111118;
    const SIDEWALK  = 0x2a2a32;
    const LANE_MARK = 0x888866;
    const CROSSWALK = 0xccccaa;
    const PARK_GREEN = 0x2d5a1e;
    const TREE_TRUNK = 0x5c3a1e;
    const TREE_LEAF  = 0x2a7a22;

    // Neon colors
    const NEON_RED   = 0xff2244;
    const NEON_BLUE  = 0x2244ff;
    const NEON_GREEN = 0x22ff88;
    const NEON_PINK  = 0xff44aa;
    const NEON_GOLD  = 0xd4af37;
    const NEON_COLORS = [NEON_RED, NEON_BLUE, NEON_GREEN, NEON_PINK, NEON_GOLD];

    // Building palettes
    const CASINO_COLORS   = [0xd4af37, 0xc9a84c, 0xb8941f, 0xe8c547];
    const CASINO_BODY     = [0x2a1a0a, 0x1a1020, 0x201018, 0x18120e];
    const HOTEL_COLORS    = [0x4466aa, 0x556688, 0x445577, 0x667799, 0x3a5588];
    const SHOP_COLORS     = [0xcc3344, 0x33aa66, 0x4488cc, 0xdd8833, 0xaa33aa];
    const RESIDENTIAL     = [0x887766, 0x998877, 0x776655, 0xaa9988, 0x665544];
    const TEMPLE_RED      = [0xaa2222, 0xbb3333, 0x992020];
    const OFFICE_COLORS   = [0x334466, 0x2a3a55, 0x3d5577, 0x224455];
    const PARKING_COLORS  = [0x555566, 0x4a4a55, 0x606070];

    // ── Grid Config ──────────────────────────────────────────
    const PLOT_SIZE  = 10;   // building plot is 10x10
    const ROAD_WIDTH = 2;    // roads between plots
    const CELL_SIZE  = PLOT_SIZE + ROAD_WIDTH; // 12 units per cell
    const GRID_COUNT = 17;   // 17x17 grid for dense coverage
    const HALF_GRID  = Math.floor(GRID_COUNT / 2);
    const CITY_EXTENT = GRID_COUNT * CELL_SIZE / 2;

    // ── Shared state ─────────────────────────────────────────
    let THREE;
    const neonMeshes = [];  // meshes with pulsing emissive
    const toonMaterials = new Map(); // cache by color
    const neonMaterials = new Map();

    // Seeded PRNG for deterministic city
    let seed = 42;
    function rng() {
        seed = (seed * 16807 + 0) % 2147483647;
        return (seed - 1) / 2147483646;
    }
    function rngInt(min, max) {
        return Math.floor(rng() * (max - min + 1)) + min;
    }
    function rngPick(arr) {
        return arr[Math.floor(rng() * arr.length)];
    }
    function rngFloat(min, max) {
        return min + rng() * (max - min);
    }

    // ── Material Helpers ─────────────────────────────────────
    function getToonMat(color) {
        const key = color;
        if (toonMaterials.has(key)) return toonMaterials.get(key);
        const mat = new THREE.MeshToonMaterial({ color });
        toonMaterials.set(key, mat);
        return mat;
    }

    function getNeonMat(color) {
        const key = color;
        if (neonMaterials.has(key)) return neonMaterials.get(key);
        const mat = new THREE.MeshBasicMaterial({ color, toneMapped: false });
        neonMaterials.set(key, mat);
        return mat;
    }

    // ── Geometry Cache ───────────────────────────────────────
    const geoCache = new Map();
    function boxGeo(w, h, d) {
        const key = `b_${w}_${h}_${d}`;
        if (geoCache.has(key)) return geoCache.get(key);
        const g = new THREE.BoxGeometry(w, h, d);
        geoCache.set(key, g);
        return g;
    }
    function cylGeo(rTop, rBot, h, seg) {
        seg = seg || 8;
        const key = `c_${rTop}_${rBot}_${h}_${seg}`;
        if (geoCache.has(key)) return geoCache.get(key);
        const g = new THREE.CylinderGeometry(rTop, rBot, h, seg);
        geoCache.set(key, g);
        return g;
    }

    // ── Instanced Mesh Helpers ───────────────────────────────
    // We'll collect window positions / tree positions then batch
    const windowPositions = [];  // {x,y,z,w,h}
    const treePositions = [];    // {x,z}

    // ── Building Generators ──────────────────────────────────
    // Each returns a THREE.Group placed at origin (bottom-center)

    // --- GRAND CASINO (4 variations) ---
    function createCasino(variation) {
        const group = new THREE.Group();
        const v = variation % 4;
        const bodyColor = rngPick(CASINO_BODY);
        const trimColor = rngPick(CASINO_COLORS);

        if (v === 0) {
            // Grand Lisboa style — cylindrical tower with lotus top
            const baseH = 12;
            const towerH = rngFloat(55, 75);
            // Wide base
            const base = new THREE.Mesh(boxGeo(9, baseH, 9), getToonMat(bodyColor));
            base.position.y = baseH / 2;
            base.castShadow = true;
            group.add(base);
            // Cylindrical tower
            const tower = new THREE.Mesh(cylGeo(3, 3.5, towerH, 12), getToonMat(bodyColor));
            tower.position.y = baseH + towerH / 2;
            tower.castShadow = true;
            group.add(tower);
            // Gold crown / lotus
            const crown = new THREE.Mesh(cylGeo(0.5, 4.5, 10, 8), getToonMat(trimColor));
            crown.position.y = baseH + towerH + 5;
            crown.castShadow = true;
            group.add(crown);
            // Gold trim ring at base
            const ring = new THREE.Mesh(cylGeo(4.5, 4.5, 1, 12), getToonMat(trimColor));
            ring.position.y = baseH;
            group.add(ring);
            // Entrance canopy
            const canopy = new THREE.Mesh(boxGeo(6, 0.3, 3), getToonMat(trimColor));
            canopy.position.set(0, 4, 5.5);
            group.add(canopy);
            // Neon sign on base
            addNeonSign(group, 0, baseH + 2, 4.6, 4, 1.5, rngPick(NEON_COLORS));
            addNeonSign(group, 0, baseH + 2, -4.6, 4, 1.5, rngPick(NEON_COLORS));
        } else if (v === 1) {
            // Wynn style — curved tower with stripe
            const h = rngFloat(50, 70);
            const body = new THREE.Mesh(boxGeo(8, h, 6), getToonMat(0x442211));
            body.position.y = h / 2;
            body.castShadow = true;
            group.add(body);
            // Gold stripe
            const stripe = new THREE.Mesh(boxGeo(8.1, h, 0.3), getToonMat(trimColor));
            stripe.position.set(0, h / 2, 3.1);
            group.add(stripe);
            const stripe2 = new THREE.Mesh(boxGeo(8.1, h, 0.3), getToonMat(trimColor));
            stripe2.position.set(0, h / 2, -3.1);
            group.add(stripe2);
            // Roof detail
            const roof = new THREE.Mesh(boxGeo(9, 2, 7), getToonMat(trimColor));
            roof.position.y = h + 1;
            group.add(roof);
            // Canopy
            const canopy = new THREE.Mesh(boxGeo(10, 0.4, 4), getToonMat(trimColor));
            canopy.position.set(0, 3.5, 5);
            group.add(canopy);
            // Neon
            addNeonSign(group, 0, h * 0.7, 3.2, 3, 2, NEON_GOLD);
            addNeonCharacters(group, 0, 6, 4.2, 3);
        } else if (v === 2) {
            // Venetian style — wide with tower
            const baseH = 18;
            const towerH = rngFloat(40, 60);
            const base = new THREE.Mesh(boxGeo(9, baseH, 9), getToonMat(0x8a7a5a));
            base.position.y = baseH / 2;
            base.castShadow = true;
            group.add(base);
            // Tower
            const tower = new THREE.Mesh(boxGeo(5, towerH, 5), getToonMat(0x8a7a5a));
            tower.position.y = baseH + towerH / 2;
            tower.castShadow = true;
            group.add(tower);
            // Arch entrance
            const archL = new THREE.Mesh(boxGeo(0.5, 6, 1), getToonMat(trimColor));
            archL.position.set(-2, 3, 4.8);
            group.add(archL);
            const archR = new THREE.Mesh(boxGeo(0.5, 6, 1), getToonMat(trimColor));
            archR.position.set(2, 3, 4.8);
            group.add(archR);
            const archTop = new THREE.Mesh(boxGeo(5, 0.5, 1), getToonMat(trimColor));
            archTop.position.set(0, 6, 4.8);
            group.add(archTop);
            // Dome on top
            const dome = new THREE.Mesh(cylGeo(0.2, 3, 4, 8), getToonMat(trimColor));
            dome.position.y = baseH + towerH + 2;
            group.add(dome);
            addNeonSign(group, 0, baseH - 2, 4.6, 5, 2, NEON_RED);
            addWindowGrid(group, 9, baseH, 9, bodyColor);
        } else {
            // MGM style — twin towers connected
            const h = rngFloat(45, 65);
            const towerA = new THREE.Mesh(boxGeo(4, h, 4), getToonMat(0x886622));
            towerA.position.set(-2.5, h / 2, 0);
            towerA.castShadow = true;
            group.add(towerA);
            const towerB = new THREE.Mesh(boxGeo(4, h, 4), getToonMat(0x886622));
            towerB.position.set(2.5, h / 2, 0);
            towerB.castShadow = true;
            group.add(towerB);
            // Bridge connector
            const bridge = new THREE.Mesh(boxGeo(9, 4, 4), getToonMat(trimColor));
            bridge.position.y = h * 0.75;
            group.add(bridge);
            // Base
            const base = new THREE.Mesh(boxGeo(9, 8, 8), getToonMat(0x332211));
            base.position.y = 4;
            base.castShadow = true;
            group.add(base);
            // Gold caps

    // --- TEMPLE / TRADITIONAL ---
    function createTemple() {
        const group = new THREE.Group();
        const red = rngPick(TEMPLE_RED);

        // Base platform
        const platform = new THREE.Mesh(boxGeo(9, 1.5, 9), getToonMat(0x888877));
        platform.position.y = 0.75;
        group.add(platform);

        // Main hall
        const hallH = 6;
        const hall = new THREE.Mesh(boxGeo(7, hallH, 7), getToonMat(red));
        hall.position.y = 1.5 + hallH / 2;
        hall.castShadow = true;
        group.add(hall);

        // Pagoda roofs — stacked trapezoids (using scaled boxes)
        const tiers = rngInt(2, 4);
        let y = 1.5 + hallH;
        let w = 8.5;
        for (let t = 0; t < tiers; t++) {
            // Roof overhang
            const roofH = 1.2;
            const roof = new THREE.Mesh(boxGeo(w, roofH, w), getToonMat(0x222222));
            roof.position.y = y + roofH / 2;
            group.add(roof);
            // Upturn edges (small boxes at corners)
            const cornerSize = 0.4;
            const cOff = w / 2 - 0.1;
            for (let cx = -1; cx <= 1; cx += 2) {
                for (let cz = -1; cz <= 1; cz += 2) {
                    const corner = new THREE.Mesh(boxGeo(cornerSize, cornerSize * 2, cornerSize), getToonMat(GOLD));
                    corner.position.set(cx * cOff, y + roofH + cornerSize, cz * cOff);
                    group.add(corner);
                }
            }
            y += roofH + 2.5;
            w -= 1.5;
            if (w < 3) break;
            // Tier body
            const tierBody = new THREE.Mesh(boxGeo(w - 1, 2, w - 1), getToonMat(red));
            tierBody.position.y = y - 1;
            tierBody.castShadow = true;
            group.add(tierBody);
        }

        // Gold finial on top
        const finial = new THREE.Mesh(cylGeo(0.1, 0.4, 2, 6), getToonMat(GOLD));
        finial.position.y = y + 1;
        group.add(finial);

        // Door
        const door = new THREE.Mesh(boxGeo(1.5, 3, 0.2), getToonMat(0x442200));
        door.position.set(0, 1.5 + 1.5, 3.6);
        group.add(door);

        // Lanterns (neon)
        const lanternL = new THREE.Mesh(cylGeo(0.3, 0.3, 0.8, 6), getNeonMat(NEON_RED));
        lanternL.position.set(-2, 5, 3.6);
        neonMeshes.push(lanternL);
        group.add(lanternL);
        const lanternR = new THREE.Mesh(cylGeo(0.3, 0.3, 0.8, 6), getNeonMat(NEON_RED));
        lanternR.position.set(2, 5, 3.6);
        neonMeshes.push(lanternR);
        group.add(lanternR);

        return group;
    }

    // ── Detail Helpers ───────────────────────────────────────

    function addNeonSign(group, x, y, z, w, h, color) {
        const sign = new THREE.Mesh(boxGeo(w, h, 0.15), getNeonMat(color));
        sign.position.set(x, y, z);

        group.add(sign);

    function addNeonCharacters(group, x, y, z, count) {
        // Fake Chinese characters: small neon rectangles arranged vertically
        const neonColor = rngPick(NEON_COLORS);
        for (let i = 0; i < count; i++) {
            const charW = rngFloat(0.6, 1.0);
            const charH = rngFloat(0.8, 1.2);
            const ch = new THREE.Mesh(boxGeo(charW, charH, 0.1), getNeonMat(neonColor));
            ch.position.set(x + (i - count / 2 + 0.5) * 1.3, y, z);
            neonMeshes.push(ch);
            group.add(ch);
            // Cross strokes
            if (rng() > 0.4) {
                const stroke = new THREE.Mesh(boxGeo(charW * 0.7, 0.12, 0.12), getNeonMat(neonColor));
                stroke.position.set(x + (i - count / 2 + 0.5) * 1.3, y + charH * 0.2, z + 0.05);
                neonMeshes.push(stroke);
                group.add(stroke);
            }
            if (rng() > 0.5) {
                const vStroke = new THREE.Mesh(boxGeo(0.12, charH * 0.6, 0.12), getNeonMat(neonColor));
                vStroke.position.set(x + (i - count / 2 + 0.5) * 1.3 + charW * 0.15, y - charH * 0.1, z + 0.05);
                neonMeshes.push(vStroke);
                group.add(vStroke);
            }
        }
    }

    function addWindowGrid(group, bw, bh, bd, windowColor) {
        // Add window-like dark rectangles as thin boxes on facades
        const ww = 0.6, wh = 0.9, gap = 2.2;
        const cols = Math.floor((bw - 1) / gap);
        const rows = Math.floor((bh - 2) / gap);
        const mat = getToonMat(windowColor || 0x111122);
        const startX = -(cols - 1) * gap / 2;

        // Front + Back faces
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const wx = startX + c * gap;
                const wy = 3 + r * gap;
                if (wy > bh - 1) continue;
                // Front
                const wf = new THREE.Mesh(boxGeo(ww, wh, 0.12), mat);
                wf.position.set(wx, wy, bd / 2 + 0.05);
                group.add(wf);
                // Back
                const wb = new THREE.Mesh(boxGeo(ww, wh, 0.12), mat);
                wb.position.set(wx, wy, -bd / 2 - 0.05);
                group.add(wb);
            }
        }

        // Side faces
        const sideCols = Math.floor((bd - 1) / gap);
        const startZ = -(sideCols - 1) * gap / 2;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < sideCols; c++) {
                const wz = startZ + c * gap;
                const wy = 3 + r * gap;
                if (wy > bh - 1) continue;
                const wl = new THREE.Mesh(boxGeo(0.12, wh, ww), mat);
                wl.position.set(bw / 2 + 0.05, wy, wz);
                group.add(wl);
                const wr = new THREE.Mesh(boxGeo(0.12, wh, ww), mat);
                wr.position.set(-bw / 2 - 0.05, wy, wz);
                group.add(wr);
            }
        }
    }

    function addScatteredWindows(group, bw, bh, bd) {
        // Lit windows (emissive) scattered on facades — gives life at night
        const mat = getNeonMat(0xffdd88);
        const count = rngInt(8, 18);
        for (let i = 0; i < count; i++) {
            const face = rngInt(0, 3);
            const wy = rngFloat(5, bh * 0.9);
            let wx, wz;
            const wSize = 0.5;
            if (face === 0) { wx = rngFloat(-bw / 2 + 1, bw / 2 - 1); wz = bd / 2 + 0.06; }
            else if (face === 1) { wx = rngFloat(-bw / 2 + 1, bw / 2 - 1); wz = -bd / 2 - 0.06; }
            else if (face === 2) { wz = rngFloat(-bd / 2 + 1, bd / 2 - 1); wx = bw / 2 + 0.06; }
            else { wz = rngFloat(-bd / 2 + 1, bd / 2 - 1); wx = -bw / 2 - 0.06; }
            const w = new THREE.Mesh(boxGeo(face < 2 ? wSize : 0.1, wSize, face >= 2 ? wSize : 0.1), mat);
            w.position.set(wx, wy, wz);
            neonMeshes.push(w);
            group.add(w);
        }
    }

    function addRooftopDetails(group, plotW) {
        // AC units, helipad, etc.
        const acCount = rngInt(1, 4);
        for (let i = 0; i < acCount; i++) {
            const ac = new THREE.Mesh(boxGeo(0.8, 0.5, 0.8), getToonMat(0x666666));
            // Find topmost child to place on roof
            let maxY = 10;
            group.children.forEach(c => {
                const top = c.position.y + (c.geometry && c.geometry.parameters ? c.geometry.parameters.height / 2 : 0);
                if (top > maxY) maxY = top;
            });
            ac.position.set(rngFloat(-plotW / 3, plotW / 3), maxY + 0.25, rngFloat(-plotW / 3, plotW / 3));
            group.add(ac);
        }

        // Helipad on taller buildings
        if (rng() > 0.6) {
            let maxY = 10;
            group.children.forEach(c => {
                const top = c.position.y + (c.geometry && c.geometry.parameters ? c.geometry.parameters.height / 2 : 0);
                if (top > maxY) maxY = top;
            });
            const pad = new THREE.Mesh(cylGeo(1.5, 1.5, 0.1, 12), getToonMat(0x666644));
            pad.position.set(0, maxY + 0.05, 0);
            group.add(pad);
            // H mark
            const hMark = new THREE.Mesh(boxGeo(0.8, 0.02, 0.15), getNeonMat(0xffff44));
            hMark.position.set(0, maxY + 0.12, 0);
            group.add(hMark);
        }
    }

    // ── City Layout ──────────────────────────────────────────
    function determineBuildingType(gx, gz) {
        // gx, gz are grid coords from -HALF_GRID to HALF_GRID
        const dist = Math.max(Math.abs(gx), Math.abs(gz));

        // Center cluster: casinos
        if (dist <= 2) return 'casino';
        // Inner ring: hotels + offices + some casinos
        if (dist <= 4) {
            const r = rng();
            if (r < 0.15) return 'casino';
            if (r < 0.40) return 'hotel';
            if (r < 0.60) return 'office';
            if (r < 0.70) return 'temple';
            if (r < 0.80) return 'mall';
            return 'hotel';
        }
        // Mid ring: mixed
        if (dist <= 6) {
            const r = rng();
            if (r < 0.10) return 'park';
            if (r < 0.25) return 'hotel';
            if (r < 0.40) return 'office';
            if (r < 0.55) return 'residential';
            if (r < 0.70) return 'shop';
            if (r < 0.80) return 'mall';
            if (r < 0.88) return 'parking';
            return 'temple';
        }
        // Outer ring: residential + shops + parks
        const r = rng();
        if (r < 0.08) return 'park';
        if (r < 0.30) return 'residential';
        if (r < 0.50) return 'shop';
        if (r < 0.65) return 'parking';
        if (r < 0.78) return 'office';
        if (r < 0.85) return 'mall';
        return 'residential';
    }

    function createBuildingForType(type) {
        switch (type) {
            case 'casino':     return createCasino(rngInt(0, 3));
            case 'hotel':      return createHotel(rngInt(0, 2));
            case 'mall':       return createMall();
            case 'residential':return createResidential();
            case 'temple':     return createTemple();
            case 'shop':       return createNeonShop();
            case 'parking':    return createParkingGarage();
            case 'office':     return createOfficeTower();
            case 'park':       return createPark();
            default:           return createResidential();
        }
    }

    // ── Ground Plane + Roads ─────────────────────────────────
    function createGroundAndRoads(scene) {
        const cityGroup = new THREE.Group();
        cityGroup.name = 'ground_roads';

        // Large ground plane
        const groundSize = GRID_COUNT * CELL_SIZE + 40;
        const ground = new THREE.Mesh(
            boxGeo(groundSize, 0.5, groundSize),
            getToonMat(ASPHALT)
        );
        ground.position.y = -0.25;
        ground.receiveShadow = true;
        cityGroup.add(ground);

        // Road surfaces — horizontal and vertical streets
        const roadMat = getToonMat(ROAD);
        const markMat = getToonMat(LANE_MARK);
        const crossMat = getToonMat(CROSSWALK);

        // Compute road positions
        for (let i = 0; i <= GRID_COUNT; i++) {
            const pos = (i - HALF_GRID) * CELL_SIZE - CELL_SIZE / 2 + PLOT_SIZE + ROAD_WIDTH / 2;

            // Horizontal road (along X)
            const hRoad = new THREE.Mesh(
                boxGeo(groundSize, 0.06, ROAD_WIDTH),
                roadMat
            );
            hRoad.position.set(0, 0.03, pos);
            hRoad.receiveShadow = true;
            cityGroup.add(hRoad);

            // Vertical road (along Z)
            const vRoad = new THREE.Mesh(
                boxGeo(ROAD_WIDTH, 0.06, groundSize),
                roadMat
            );
            vRoad.position.set(pos, 0.03, 0);
            vRoad.receiveShadow = true;
            cityGroup.add(vRoad);

            // Lane markings — dashed center line
            const dashCount = Math.floor(groundSize / 4);
            for (let d = 0; d < dashCount; d++) {
                const dp = -groundSize / 2 + d * 4 + 1;

                // Horizontal road dashes
                const hDash = new THREE.Mesh(boxGeo(1.5, 0.01, 0.1), markMat);
                hDash.position.set(dp, 0.07, pos);
                cityGroup.add(hDash);

                // Vertical road dashes
                const vDash = new THREE.Mesh(boxGeo(0.1, 0.01, 1.5), markMat);
                vDash.position.set(pos, 0.07, dp);
                cityGroup.add(vDash);
            }
        }

        // Crosswalks at intersections (only every other intersection to reduce geometry)
        for (let ix = 0; ix <= GRID_COUNT; ix += 2) {
            for (let iz = 0; iz <= GRID_COUNT; iz += 2) {
                const cx = (ix - HALF_GRID) * CELL_SIZE - CELL_SIZE / 2 + PLOT_SIZE + ROAD_WIDTH / 2;
                const cz = (iz - HALF_GRID) * CELL_SIZE - CELL_SIZE / 2 + PLOT_SIZE + ROAD_WIDTH / 2;

                // Crosswalk stripes (4 stripes)
                for (let s = 0; s < 4; s++) {
                    const cw = new THREE.Mesh(boxGeo(0.3, 0.015, 1.8), crossMat);
                    cw.position.set(cx - 0.7 + s * 0.5, 0.075, cz);
                    cityGroup.add(cw);
                }
            }
        }

        // Sidewalk edges along roads
        const sidewalkMat = getToonMat(SIDEWALK);
        for (let i = 0; i <= GRID_COUNT; i++) {
            const pos = (i - HALF_GRID) * CELL_SIZE - CELL_SIZE / 2 + PLOT_SIZE + ROAD_WIDTH / 2;

            // Curbs for horizontal roads
            const curbH1 = new THREE.Mesh(boxGeo(groundSize, 0.15, 0.2), sidewalkMat);
            curbH1.position.set(0, 0.075, pos - ROAD_WIDTH / 2 - 0.1);
            cityGroup.add(curbH1);
            const curbH2 = new THREE.Mesh(boxGeo(groundSize, 0.15, 0.2), sidewalkMat);
            curbH2.position.set(0, 0.075, pos + ROAD_WIDTH / 2 + 0.1);
            cityGroup.add(curbH2);

            // Curbs for vertical roads
            const curbV1 = new THREE.Mesh(boxGeo(0.2, 0.15, groundSize), sidewalkMat);
            curbV1.position.set(pos - ROAD_WIDTH / 2 - 0.1, 0.075, 0);
            cityGroup.add(curbV1);
            const curbV2 = new THREE.Mesh(boxGeo(0.2, 0.15, groundSize), sidewalkMat);
            curbV2.position.set(pos + ROAD_WIDTH / 2 + 0.1, 0.075, 0);
            cityGroup.add(curbV2);
        }

        scene.add(cityGroup);
    }

    // ── Street Furniture (batched) ───────────────────────────
    function addStreetFurniture(scene) {
        const furnitureGroup = new THREE.Group();
        furnitureGroup.name = 'street_furniture';

        // Street lamps at intersections
        for (let ix = 0; ix <= GRID_COUNT; ix += 2) {
            for (let iz = 0; iz <= GRID_COUNT; iz += 2) {
                const cx = (ix - HALF_GRID) * CELL_SIZE - CELL_SIZE / 2 + PLOT_SIZE + ROAD_WIDTH / 2;
                const cz = (iz - HALF_GRID) * CELL_SIZE - CELL_SIZE / 2 + PLOT_SIZE + ROAD_WIDTH / 2;

                // Lamp post
                const pole = new THREE.Mesh(cylGeo(0.06, 0.06, 4, 4), getToonMat(0x444444));
                pole.position.set(cx + 1.5, 2, cz + 1.5);
                furnitureGroup.add(pole);

                const lamp = new THREE.Mesh(boxGeo(0.4, 0.15, 0.4), getNeonMat(0xffffaa));
                lamp.position.set(cx + 1.5, 4.1, cz + 1.5);
                neonMeshes.push(lamp);
                furnitureGroup.add(lamp);
            }
        }

        scene.add(furnitureGroup);
    }

    // ── Main Build ───────────────────────────────────────────
    function buildCity(scene) {
        // Reset RNG for determinism
        seed = 42;

        // Ground & roads
        createGroundAndRoads(scene);

        // Buildings
        const buildingGroup = new THREE.Group();
        buildingGroup.name = 'buildings';

        let buildingCount = 0;
        for (let gx = -HALF_GRID; gx <= HALF_GRID; gx++) {
            for (let gz = -HALF_GRID; gz <= HALF_GRID; gz++) {
                const type = determineBuildingType(gx, gz);
                const building = createBuildingForType(type);

                // Position on grid
                const worldX = gx * CELL_SIZE;
                const worldZ = gz * CELL_SIZE;
                building.position.set(worldX, 0, worldZ);

                // Random rotation (90-degree increments) for variety
                const rot = rngInt(0, 3) * Math.PI / 2;
                building.rotation.y = rot;

                buildingGroup.add(building);
                buildingCount++;
            }
        }

        scene.add(buildingGroup);

        // Street furniture
        addStreetFurniture(scene);

        console.log(
            `%c Baccarat City %c ${buildingCount} buildings placed, ${neonMeshes.length} neon elements `,
            'background:#d4af37;color:#0a0a12;font-weight:bold;padding:2px 6px;border-radius:3px 0 0 3px;',
            'background:#0a0a12;color:#d4af37;font-weight:bold;padding:2px 6px;border-radius:0 3px 3px 0;'
        );
    }

    // ── Module Interface ─────────────────────────────────────
    function init({ scene, camera, renderer, THREE: three }) {
        THREE = three;
        buildCity(scene);
    }

    function update(dt, elapsed) {
        // Pulse neon signs — vary intensity with sine wave
        // We group neon meshes and vary their color brightness
        const pulse = 0.85 + 0.15 * Math.sin(elapsed * 2.5);
        const fastPulse = 0.8 + 0.2 * Math.sin(elapsed * 5.0);
        const slowPulse = 0.9 + 0.1 * Math.sin(elapsed * 1.2);

        for (let i = 0; i < neonMeshes.length; i++) {
            const mesh = neonMeshes[i];
            if (!mesh.material) continue;

            // Alternate between pulse speeds based on index for variety
            const t = i % 3 === 0 ? fastPulse : i % 3 === 1 ? pulse : slowPulse;

            // Scale the base color
            const baseColor = mesh.material.color;
            const r = baseColor.r, g = baseColor.g, b = baseColor.b;
            // We only need to set intensity — for BasicMaterial we modulate color
            // Store original color on first run
            if (!mesh.userData._baseR) {
                mesh.userData._baseR = r;
                mesh.userData._baseG = g;
                mesh.userData._baseB = b;
            }
            mesh.material.color.setRGB(
                mesh.userData._baseR * t,
                mesh.userData._baseG * t,
                mesh.userData._baseB * t
            );
        }
    }

    // ── Register ─────────────────────────────────────────────
    window.BACCARAT.registerModule({ init, update });

})();

// === ENTITIES ===
// ============================================================
// Baccarat City — Entities: Vehicles + Pedestrians
// ============================================================
// Animated vehicles driving on roads and pedestrians walking
// on sidewalks. Pool-based allocation, simple collision
// avoidance, headlights/taillights for bloom glow.
// ============================================================

(function () {
    'use strict';

    // ── Grid Constants (must match city-geometry) ─────────────
    const PLOT_SIZE  = 10;
    const ROAD_WIDTH = 2;
    const CELL_SIZE  = PLOT_SIZE + ROAD_WIDTH; // 12
    const GRID_COUNT = 17;
    const HALF_GRID  = Math.floor(GRID_COUNT / 2); // 8
    const CITY_EXTENT = GRID_COUNT * CELL_SIZE / 2; // 102

    // Road center lines: -96, -84, -72 ... 0 ... 72, 84, 96
    const ROAD_LINES = [];
    for (let n = 0; n < GRID_COUNT; n++) {
        ROAD_LINES.push(-HALF_GRID * CELL_SIZE + n * CELL_SIZE);
    }
    // That gives: -96, -84, -72, -60, -48, -36, -24, -12, 0, 12, 24, 36, 48, 60, 72, 84, 96

    const CITY_MIN = -CITY_EXTENT;
    const CITY_MAX =  CITY_EXTENT;

    // ── Config ────────────────────────────────────────────────
    const VEHICLE_COUNT     = 35;
    const PEDESTRIAN_COUNT  = 45;

    // ── Shared state ──────────────────────────────────────────
    let THREE;
    let scene;

    // Material caches
    const toonMats = new Map();
    const basicMats = new Map();

    function getToonMat(color) {
        if (toonMats.has(color)) return toonMats.get(color);
        const m = new THREE.MeshToonMaterial({ color });
        toonMats.set(color, m);
        return m;
    }

    function getBasicMat(color) {
        if (basicMats.has(color)) return basicMats.get(color);
        const m = new THREE.MeshBasicMaterial({ color, toneMapped: false });
        basicMats.set(color, m);
        return m;
    }

    // ── Shared geometry cache ─────────────────────────────────
    const geoCache = new Map();
    function boxGeo(w, h, d) {
        const key = `${w},${h},${d}`;
        if (geoCache.has(key)) return geoCache.get(key);
        const g = new THREE.BoxGeometry(w, h, d);
        geoCache.set(key, g);
        return g;
    }
    let sphereGeo, cylGeo, wheelGeo;

    // ── RNG ───────────────────────────────────────────────────
    function rand(min, max) {
        return min + Math.random() * (max - min);
    }
    function randInt(min, max) {
        return Math.floor(rand(min, max + 0.999));
    }
    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ════════════════════════════════════════════════════════════
    //  VEHICLE SYSTEM
    // ════════════════════════════════════════════════════════════

    // Vehicle type definitions
    const VEHICLE_TYPES = {
        sedan: {
            bodyW: 1.2, bodyH: 0.5, bodyD: 2.0,
            cabinW: 1.0, cabinH: 0.4, cabinD: 1.0, cabinY: 0.45,
            colors: [0x3355aa, 0x555555, 0x882222, 0x228833, 0x666688, 0x444444, 0x993333],
            weight: 5, speedMin: 9, speedMax: 14,
        },
        taxi: {
            bodyW: 1.2, bodyH: 0.5, bodyD: 2.0,
            cabinW: 1.0, cabinH: 0.4, cabinD: 1.0, cabinY: 0.45,
            colors: [0xddcc22, 0xe8d030],
            weight: 3, speedMin: 8, speedMax: 13,
        },
        limo: {
            bodyW: 1.3, bodyH: 0.5, bodyD: 3.2,
            cabinW: 1.1, cabinH: 0.4, cabinD: 1.6, cabinY: 0.45,
            colors: [0x111111, 0x1a1a1a, 0xeeeeee],
            weight: 2, speedMin: 7, speedMax: 11,
        },
        bus: {
            bodyW: 1.6, bodyH: 1.2, bodyD: 3.8,
            cabinW: 0, cabinH: 0, cabinD: 0, cabinY: 0,
            colors: [0x2255aa, 0xcc3333, 0x22aa55],
            weight: 1, speedMin: 6, speedMax: 10,
        },
        sports: {
            bodyW: 1.4, bodyH: 0.35, bodyD: 2.2,
            cabinW: 1.1, cabinH: 0.3, cabinD: 0.8, cabinY: 0.32,
            colors: [0xcc2222, 0x2244cc, 0xddaa11, 0xff4400],
            weight: 2, speedMin: 12, speedMax: 18,
        },
        van: {
            bodyW: 1.4, bodyH: 0.9, bodyD: 2.4,
            cabinW: 1.3, cabinH: 0.3, cabinD: 0.8, cabinY: 0.6,
            colors: [0xeeeeee, 0x4477aa, 0xcc8833],
            weight: 1, speedMin: 7, speedMax: 11,
        },
    };

    // Build weighted type array
    const VEHICLE_TYPE_POOL = [];
    for (const [name, def] of Object.entries(VEHICLE_TYPES)) {
        for (let i = 0; i < def.weight; i++) {
            VEHICLE_TYPE_POOL.push(name);
        }
    }

    function createVehicleMesh(typeName) {
        const def = VEHICLE_TYPES[typeName];
        const group = new THREE.Group();
        const color = pick(def.colors);

        // Body
        const body = new THREE.Mesh(boxGeo(def.bodyW, def.bodyH, def.bodyD), getToonMat(color));
        body.position.y = def.bodyH / 2 + 0.15; // above road + wheel clearance
        body.castShadow = true;
        group.add(body);

        // Cabin (if present)
        if (def.cabinW > 0) {
            const cabin = new THREE.Mesh(boxGeo(def.cabinW, def.cabinH, def.cabinD), getToonMat(0x333344));
            cabin.position.y = def.cabinY + 0.15;
            cabin.position.z = -def.bodyD * 0.05; // slightly toward rear
            cabin.castShadow = true;
            group.add(cabin);
        }

        // Wheels (4 dark cylinders)
        const wheelRadius = 0.12;
        const wheelWidth = 0.08;
        const offsets = [
            [-def.bodyW / 2 - 0.02, wheelRadius, -def.bodyD * 0.32],
            [ def.bodyW / 2 + 0.02, wheelRadius, -def.bodyD * 0.32],
            [-def.bodyW / 2 - 0.02, wheelRadius,  def.bodyD * 0.32],
            [ def.bodyW / 2 + 0.02, wheelRadius,  def.bodyD * 0.32],
        ];
        for (const [wx, wy, wz] of offsets) {
            const wheel = new THREE.Mesh(wheelGeo, getToonMat(0x111111));
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(wx, wy, wz);
            group.add(wheel);
        }

        // Headlights (front = +z direction in local space)
        const hlGeo = boxGeo(0.15, 0.1, 0.06);
        const hlMat = getBasicMat(0xffffcc);
        const hlL = new THREE.Mesh(hlGeo, hlMat);
        const hlR = new THREE.Mesh(hlGeo, hlMat);
        hlL.position.set(-def.bodyW * 0.35, def.bodyH * 0.5 + 0.15, def.bodyD / 2 + 0.02);
        hlR.position.set( def.bodyW * 0.35, def.bodyH * 0.5 + 0.15, def.bodyD / 2 + 0.02);
        group.add(hlL, hlR);

        // Taillights (rear = -z direction)
        const tlGeo = boxGeo(0.18, 0.08, 0.06);
        const tlMat = getBasicMat(0xff2200);
        const tlL = new THREE.Mesh(tlGeo, tlMat);
        const tlR = new THREE.Mesh(tlGeo, tlMat);
        tlL.position.set(-def.bodyW * 0.35, def.bodyH * 0.5 + 0.15, -def.bodyD / 2 - 0.02);
        tlR.position.set( def.bodyW * 0.35, def.bodyH * 0.5 + 0.15, -def.bodyD / 2 - 0.02);
        group.add(tlL, tlR);

        return group;
    }

    // ── Vehicle Pool ──────────────────────────────────────────
    const vehicles = [];

    function initVehicle(v) {
        // Pick a random road line and direction
        const axis = Math.random() < 0.5 ? 'x' : 'z'; // axis of travel
        const roadLine = pick(ROAD_LINES);
        const direction = Math.random() < 0.5 ? 1 : -1;
        const startPos = rand(CITY_MIN, CITY_MAX);

        // Slight lateral offset so opposing lanes don't overlap
        const laneOffset = direction * 0.4;

        v.axis = axis;
        v.roadLine = roadLine;
        v.direction = direction;
        v.speed = rand(v.typeDef.speedMin, v.typeDef.speedMax);
        v.turnCooldown = 0;
        v.stopped = false;

        if (axis === 'x') {
            // Traveling along X axis, fixed Z = roadLine
            v.mesh.position.set(startPos, 0, roadLine + laneOffset);
            v.mesh.rotation.y = direction > 0 ? Math.PI / 2 : -Math.PI / 2;
        } else {
            // Traveling along Z axis, fixed X = roadLine
            v.mesh.position.set(roadLine + laneOffset, 0, startPos);
            v.mesh.rotation.y = direction > 0 ? 0 : Math.PI;
        }
    }

    function spawnVehicles() {
        for (let i = 0; i < VEHICLE_COUNT; i++) {
            const typeName = pick(VEHICLE_TYPE_POOL);
            const mesh = createVehicleMesh(typeName);
            scene.add(mesh);

            const v = {
                mesh,
                typeName,
                typeDef: VEHICLE_TYPES[typeName],
                axis: 'x',
                roadLine: 0,
                direction: 1,
                speed: 10,
                turnCooldown: 0,
                stopped: false,
            };

            initVehicle(v);
            vehicles.push(v);
        }
    }

    function findNearestRoadLine(val) {
        let best = ROAD_LINES[0];
        let bestDist = Math.abs(val - best);
        for (let i = 1; i < ROAD_LINES.length; i++) {
            const d = Math.abs(val - ROAD_LINES[i]);
            if (d < bestDist) { bestDist = d; best = ROAD_LINES[i]; }
        }
        return best;
    }

    function isNearIntersection(pos, axis) {
        // Check if the travel-axis position is near a cross-road line
        const travelPos = axis === 'x' ? pos.x : pos.z;
        for (let i = 0; i < ROAD_LINES.length; i++) {
            if (Math.abs(travelPos - ROAD_LINES[i]) < 0.8) return ROAD_LINES[i];
        }
        return null;
    }

    function updateVehicles(dt) {
        for (let i = 0; i < vehicles.length; i++) {
            const v = vehicles[i];
            const pos = v.mesh.position;

            // Simple collision avoidance: check distance to vehicles ahead
            let slowFactor = 1;
            for (let j = 0; j < vehicles.length; j++) {
                if (i === j) continue;
                const o = vehicles[j];
                if (o.axis !== v.axis || o.roadLine !== v.roadLine) continue;

                const myPos = v.axis === 'x' ? pos.x : pos.z;
                const otherPos = v.axis === 'x' ? o.mesh.position.x : o.mesh.position.z;
                const diff = (otherPos - myPos) * v.direction;

                if (diff > 0 && diff < 4) {
                    slowFactor = Math.min(slowFactor, diff / 4);
                }
            }

            // Move
            const move = v.speed * dt * slowFactor;
            if (v.axis === 'x') {
                pos.x += move * v.direction;
            } else {
                pos.z += move * v.direction;
            }

            // Try turning at intersections
            v.turnCooldown -= dt;
            if (v.turnCooldown <= 0) {
                const crossRoad = isNearIntersection(pos, v.axis);
                if (crossRoad !== null && Math.random() < 0.15) {
                    // Turn!
                    const newAxis = v.axis === 'x' ? 'z' : 'x';
                    const newRoadLine = crossRoad;
                    const newDirection = Math.random() < 0.5 ? 1 : -1;
                    const laneOffset = newDirection * 0.4;

                    // Snap to intersection
                    if (v.axis === 'x') {
                        // Was traveling X, now travel Z. Fix X = current cross road
                        const snapX = findNearestRoadLine(pos.x);
                        pos.x = snapX + (newAxis === 'z' ? laneOffset : 0);
                        pos.z = newRoadLine + (newAxis === 'x' ? laneOffset : 0);
                    } else {
                        const snapZ = findNearestRoadLine(pos.z);
                        pos.z = snapZ + (newAxis === 'x' ? laneOffset : 0);
                        pos.x = newRoadLine + (newAxis === 'z' ? laneOffset : 0);
                    }

                    v.axis = newAxis;
                    v.roadLine = newRoadLine;
                    v.direction = newDirection;

                    // Update rotation
                    if (newAxis === 'x') {
                        v.mesh.rotation.y = newDirection > 0 ? Math.PI / 2 : -Math.PI / 2;
                    } else {
                        v.mesh.rotation.y = newDirection > 0 ? 0 : Math.PI;
                    }

                    v.turnCooldown = 2.0; // don't turn again for 2 seconds
                }
            }

            // Wrap at city edges
            const travelPos = v.axis === 'x' ? pos.x : pos.z;
            if (travelPos > CITY_MAX + 5) {
                if (v.axis === 'x') pos.x = CITY_MIN - 3;
                else pos.z = CITY_MIN - 3;
            } else if (travelPos < CITY_MIN - 5) {
                if (v.axis === 'x') pos.x = CITY_MAX + 3;
                else pos.z = CITY_MAX + 3;
            }
        }
    }

    // ════════════════════════════════════════════════════════════
    //  PEDESTRIAN SYSTEM
    // ════════════════════════════════════════════════════════════

    const PED_BODY_COLORS = [
        0xcc3344, 0x3366cc, 0x33aa55, 0xddaa22, 0xaa33aa,
        0x55aacc, 0xcc6633, 0x6644aa, 0xaa5555, 0x448866,
        0xdd5599, 0x3388aa, 0xbb8833, 0x7755cc, 0x558844,
    ];

    const SKIN_COLORS = [0xf5d0a9, 0xd2a67a, 0xc6956b, 0x8d5524, 0xf0c8a0];

    function createPedestrianMesh() {
        const group = new THREE.Group();
        const bodyColor = pick(PED_BODY_COLORS);
        const skinColor = pick(SKIN_COLORS);

        // Body (cylinder-like using box for cheapness)
        const body = new THREE.Mesh(boxGeo(0.3, 0.5, 0.2), getToonMat(bodyColor));
        body.position.y = 0.55;
        body.castShadow = true;
        group.add(body);

        // Head (sphere)
        const head = new THREE.Mesh(sphereGeo, getToonMat(skinColor));
        head.position.y = 0.95;
        head.scale.set(0.15, 0.15, 0.15);
        head.castShadow = true;
        group.add(head);

        // Legs (two thin boxes)
        const legMat = getToonMat(0x222233);
        const legL = new THREE.Mesh(boxGeo(0.1, 0.35, 0.12), legMat);
        const legR = new THREE.Mesh(boxGeo(0.1, 0.35, 0.12), legMat);
        legL.position.set(-0.08, 0.175, 0);
        legR.position.set( 0.08, 0.175, 0);
        group.add(legL, legR);

        // Store references for animation
        group.userData.legL = legL;
        group.userData.legR = legR;

        return group;
    }

    const pedestrians = [];

    function initPedestrian(p, scattered) {
        // Pick a road to walk along on the sidewalk
        const axis = Math.random() < 0.5 ? 'x' : 'z';
        const roadLine = pick(ROAD_LINES);
        const direction = Math.random() < 0.5 ? 1 : -1;
        const side = Math.random() < 0.5 ? 1 : -1;
        const sidewalkOffset = side * 1.5; // sidewalk is ~1.5 units from road center

        const startPos = scattered ? rand(CITY_MIN, CITY_MAX) : (direction > 0 ? CITY_MIN - 2 : CITY_MAX + 2);

        p.axis = axis;
        p.roadLine = roadLine;
        p.direction = direction;
        p.speed = rand(1.5, 3.0);
        p.bobPhase = rand(0, Math.PI * 2);
        p.standing = Math.random() < 0.08; // 8% chance standing still

        if (axis === 'x') {
            p.mesh.position.set(startPos, 0, roadLine + sidewalkOffset);
            p.mesh.rotation.y = direction > 0 ? Math.PI / 2 : -Math.PI / 2;
        } else {
            p.mesh.position.set(roadLine + sidewalkOffset, 0, startPos);
            p.mesh.rotation.y = direction > 0 ? 0 : Math.PI;
        }
    }

    function spawnPedestrians() {
        for (let i = 0; i < PEDESTRIAN_COUNT; i++) {
            const mesh = createPedestrianMesh();
            scene.add(mesh);

            const p = {
                mesh,
                axis: 'x',
                roadLine: 0,
                direction: 1,
                speed: 2,
                bobPhase: 0,
                standing: false,
            };

            initPedestrian(p, true);
            pedestrians.push(p);
        }
    }

    function updatePedestrians(dt, elapsed) {
        for (let i = 0; i < pedestrians.length; i++) {
            const p = pedestrians[i];
            const pos = p.mesh.position;

            if (p.standing) {
                // Just bob slightly
                pos.y = Math.sin(elapsed * 0.5 + p.bobPhase) * 0.02;
                continue;
            }

            // Move
            const move = p.speed * dt;
            if (p.axis === 'x') {
                pos.x += move * p.direction;
            } else {
                pos.z += move * p.direction;
            }

            // Walking bob
            p.bobPhase += dt * p.speed * 4;
            pos.y = Math.abs(Math.sin(p.bobPhase)) * 0.1;

            // Leg animation
            const legAngle = Math.sin(p.bobPhase) * 0.4;
            const legL = p.mesh.userData.legL;
            const legR = p.mesh.userData.legR;
            if (legL && legR) {
                legL.rotation.x =  legAngle;
                legR.rotation.x = -legAngle;
            }

            // Wrap or re-init at city edges
            const travelPos = p.axis === 'x' ? pos.x : pos.z;
            if (travelPos > CITY_MAX + 3 || travelPos < CITY_MIN - 3) {
                initPedestrian(p, true);
            }
        }
    }

    // ════════════════════════════════════════════════════════════
    //  MODULE REGISTRATION
    // ════════════════════════════════════════════════════════════

    function init(ctx) {
        THREE = ctx.THREE;
        scene = ctx.scene;

        // Init shared geometries
        sphereGeo = new THREE.SphereGeometry(1, 8, 6);
        cylGeo = new THREE.CylinderGeometry(0.5, 0.5, 1, 8);
        wheelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.08, 6);

        spawnVehicles();
        spawnPedestrians();
    }

    function update(deltaTime, elapsedTime) {
        // Clamp deltaTime to avoid huge jumps on tab-switch
        const dt = Math.min(deltaTime, 0.1);
        updateVehicles(dt);
        updatePedestrians(dt, elapsedTime);
    }

    window.BACCARAT.registerModule({ init, update });

})();

// === ATMOSPHERE ===
// ============================================================
// Baccarat City — Atmosphere: Day/Night Cycle + Dynamic Lighting
// ============================================================
// Real-time day/night cycle (~120s full cycle) with dynamic
// sun/moon positioning, sky color transitions, fog density,
// star field, and neon bloom intensity scaling. Transforms the
// cityscape from a sun-lit daytime scene to a glowing neon
// nightscape and back.
// ============================================================

(function () {
    'use strict';

    // ── Timing ───────────────────────────────────────────────
    const CYCLE_DURATION = 120;       // seconds for a full 24h cycle
    const HOURS_PER_SEC  = 24 / CYCLE_DURATION;
    const START_HOUR     = 12;        // start at noon so user sees day first

    // ── Phase boundaries ─────────────────────────────────────
    // Dawn 5-7, Day 7-17, Dusk 17-19, Night 19-5
    const DAWN_START  = 5;
    const DAWN_END    = 7;
    const DUSK_START  = 17;
    const DUSK_END    = 19;

    // ── Color presets (as [r, g, b] 0-1) ─────────────────────
    function hexToRGB(hex) {
        return [
            ((hex >> 16) & 0xff) / 255,
            ((hex >> 8) & 0xff) / 255,
            (hex & 0xff) / 255,
        ];
    }

    // Sky / background
    const SKY_DAY   = hexToRGB(0x1a2a4a);
    const SKY_DUSK  = hexToRGB(0x2a1a2a);
    const SKY_NIGHT = hexToRGB(0x060612);
    const SKY_DAWN  = hexToRGB(0x1a1a2a);

    // Ambient light
    const AMB_DAY   = hexToRGB(0x334455);
    const AMB_NIGHT = hexToRGB(0x111133);

    // Fog
    const FOG_DAY   = hexToRGB(0x1a2a3a);
    const FOG_NIGHT = hexToRGB(0x060610);

    // Hemisphere light
    const HEMI_SKY_DAY   = hexToRGB(0x1a1a2e);
    const HEMI_SKY_NIGHT = hexToRGB(0x080818);
    const HEMI_GND_DAY   = hexToRGB(0x0a0a0a);
    const HEMI_GND_NIGHT = hexToRGB(0x050508);

    // ── Bloom / exposure presets ─────────────────────────────
    const BLOOM_DAY   = 0.3;
    const BLOOM_NIGHT = 0.8;
    const EXPOSURE_DAY   = 1.0;
    const EXPOSURE_NIGHT = 0.8;

    // ── State ────────────────────────────────────────────────
    let THREE;
    let scene, renderer, camera;
    let timeOfDay = START_HOUR; // 0-24 float

    // Lights we manage
    let sunLight   = null;  // DirectionalLight (warm)
    let moonLight  = null;  // DirectionalLight (cool)
    let ambientLight = null;
    let hemiLight  = null;
    let fillLight  = null;

    // Stars
    let starField  = null;
    let starMaterial = null;

    // References to existing scene lights we'll take over
    let originalLights = [];

    // ── Helpers ───────────────────────────────────────────────

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function lerpRGB(out, a, b, t) {
        out[0] = lerp(a[0], b[0], t);
        out[1] = lerp(a[1], b[1], t);
        out[2] = lerp(a[2], b[2], t);
        return out;
    }

    function setColorFromRGB(color, rgb) {
        color.setRGB(rgb[0], rgb[1], rgb[2]);
    }

    // Smooth step for more pleasing transitions
    function smoothstep(edge0, edge1, x) {
        const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
        return t * t * (3 - 2 * t);
    }

    // Get a blend factor 0-1 for how "night" it is
    function getNightFactor(hour) {
        // Night: 1.0 when hour in [19, 5] (wrapping)
        // Day: 0.0 when hour in [7, 17]
        // Dawn: transition from 1->0 during [5, 7]
        // Dusk: transition from 0->1 during [17, 19]
        if (hour >= DAWN_END && hour <= DUSK_START) return 0;  // full day
        if (hour >= DUSK_END || hour <= DAWN_START) return 1;  // full night
        if (hour > DUSK_START && hour < DUSK_END) {
            return smoothstep(DUSK_START, DUSK_END, hour);
        }
        if (hour > DAWN_START && hour < DAWN_END) {
            return 1 - smoothstep(DAWN_START, DAWN_END, hour);
        }
        return 0;
    }

    // Get sky color with 4-phase blending
    function getSkyColor(hour, out) {
        const nf = getNightFactor(hour);

        // Determine if we're in dawn or dusk transition
        if (hour > DAWN_START && hour < DAWN_END) {
            // Dawn: blend from night -> dawn -> day
            const t = smoothstep(DAWN_START, DAWN_END, hour);
            if (t < 0.5) {
                lerpRGB(out, SKY_NIGHT, SKY_DAWN, t * 2);
            } else {
                lerpRGB(out, SKY_DAWN, SKY_DAY, (t - 0.5) * 2);
            }
        } else if (hour > DUSK_START && hour < DUSK_END) {
            // Dusk: blend from day -> dusk -> night
            const t = smoothstep(DUSK_START, DUSK_END, hour);
            if (t < 0.5) {
                lerpRGB(out, SKY_DAY, SKY_DUSK, t * 2);
            } else {
                lerpRGB(out, SKY_DUSK, SKY_NIGHT, (t - 0.5) * 2);
            }
        } else {
            // Pure day or pure night
            lerpRGB(out, SKY_DAY, SKY_NIGHT, nf);
        }
        return out;
    }

    // ── Init ─────────────────────────────────────────────────
    function init(ctx) {
        THREE = ctx.THREE;
        scene = ctx.scene;
        renderer = ctx.renderer;
        camera = ctx.camera;

        // ── Remove or dim existing lights ────────────────────
        // Find and catalog existing lights so we can control them
        const toRemove = [];
        scene.children.forEach(child => {
            if (child.isAmbientLight) {
                ambientLight = child; // take ownership
            } else if (child.isHemisphereLight) {
                hemiLight = child;
            } else if (child.isDirectionalLight) {
                // Identify by position: key light is at (-80, 150, 60)
                if (child.position.y > 100) {
                    // This is the key light — we'll replace it with our sun
                    toRemove.push(child);
                } else {
                    // Fill light — keep reference
                    fillLight = child;
                }
            }
        });

        // Remove old key light
        toRemove.forEach(l => scene.remove(l));

        // ── Create Sun (directional) ─────────────────────────
        sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(2048, 2048);
        const ws = 200 * 0.6;
        sunLight.shadow.camera.left   = -ws;
        sunLight.shadow.camera.right  =  ws;
        sunLight.shadow.camera.top    =  ws;
        sunLight.shadow.camera.bottom = -ws;
        sunLight.shadow.camera.near   = 1;
        sunLight.shadow.camera.far    = 400;
        sunLight.shadow.bias = -0.001;
        scene.add(sunLight);

        // ── Create Moon (directional, no shadow for perf) ────
        moonLight = new THREE.DirectionalLight(0x4466aa, 0.0);
        moonLight.castShadow = false;
        scene.add(moonLight);

        // If ambientLight wasn't found, create one
        if (!ambientLight) {
            ambientLight = new THREE.AmbientLight(0x334455, 0.6);
            scene.add(ambientLight);
        }

        // If hemiLight wasn't found, create one
        if (!hemiLight) {
            hemiLight = new THREE.HemisphereLight(0x1a1a2e, 0x0a0a0a, 0.3);
            scene.add(hemiLight);
        }

        // ── Create Star Field ────────────────────────────────
        createStars();

        // ── Initialize BACCARAT namespace values ─────────────
        window.BACCARAT.timeOfDay = timeOfDay;
        window.BACCARAT.isNight = false;

        console.log(
            '%c Baccarat City %c Atmosphere Online ',
            'background:#4466aa;color:#fff;font-weight:bold;padding:2px 6px;border-radius:3px 0 0 3px;',
            'background:#0a0a12;color:#4466aa;font-weight:bold;padding:2px 6px;border-radius:0 3px 3px 0;'
        );
    }

    // ── Stars ────────────────────────────────────────────────
    function createStars() {
        const count = 200;
        const positions = new Float32Array(count * 3);
        const sizes = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            // Distribute stars in a large dome above the city
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI * 0.45; // upper hemisphere
            const radius = 250 + Math.random() * 150;

            positions[i * 3]     = Math.cos(theta) * Math.sin(phi) * radius;
            positions[i * 3 + 1] = Math.cos(phi) * radius + 50; // push above city
            positions[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * radius;

            sizes[i] = 0.5 + Math.random() * 1.5;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        starMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 1.2,
            sizeAttenuation: false,
            transparent: true,
            opacity: 0,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        starField = new THREE.Points(geometry, starMaterial);
        starField.renderOrder = -1; // render behind everything
        scene.add(starField);
    }

    // ── Update (called every frame) ──────────────────────────
    const _skyRGB = [0, 0, 0];
    const _ambRGB = [0, 0, 0];
    const _fogRGB = [0, 0, 0];
    const _hemiSkyRGB = [0, 0, 0];
    const _hemiGndRGB = [0, 0, 0];

    function update(deltaTime, elapsedTime) {
        // ── Advance time ─────────────────────────────────────
        timeOfDay += deltaTime * HOURS_PER_SEC;
        if (timeOfDay >= 24) timeOfDay -= 24;

        const nf = getNightFactor(timeOfDay);
        const df = 1 - nf; // day factor

        // ── Expose to global ─────────────────────────────────
        window.BACCARAT.timeOfDay = timeOfDay;
        window.BACCARAT.isNight = nf > 0.5;

        // ── Sun position (arc across sky) ────────────────────
        // Sun is visible roughly 5-19. Map hour to angle.
        // At hour=12 (noon), sun is directly overhead.
        // sunAngle: 0 = east horizon, PI = west horizon
        const sunHourRange = DUSK_END - DAWN_START; // 14 hours of sun travel
        const sunProgress = (timeOfDay - DAWN_START) / sunHourRange;
        const sunAngle = sunProgress * Math.PI;

        const sunRadius = 180;
        const sunX = Math.cos(sunAngle) * sunRadius * 0.6;
        const sunY = Math.sin(sunAngle) * sunRadius;
        const sunZ = Math.cos(sunAngle) * sunRadius * 0.4;

        sunLight.position.set(sunX, Math.max(sunY, -20), sunZ);

        // Sun intensity: full during day, zero at night
        const sunIntensity = lerp(1.5, 0, nf);
        sunLight.intensity = Math.max(0, sunIntensity);

        // Sun color: warm white during day, orange-red near horizon
        const horizonFactor = 1 - Math.sin(Math.max(0, sunAngle));
        const sunR = lerp(1.0, 1.0, horizonFactor);
        const sunG = lerp(0.93, 0.6, horizonFactor * 0.5);
        const sunB = lerp(0.87, 0.3, horizonFactor * 0.7);
        sunLight.color.setRGB(sunR, sunG, sunB);

        // Shadow visibility
        sunLight.castShadow = nf < 0.8;

        // ── Moon position (opposite arc) ─────────────────────
        const moonAngle = sunAngle + Math.PI; // opposite of sun
        const moonX = Math.cos(moonAngle) * sunRadius * 0.5;
        const moonY = Math.sin(moonAngle) * sunRadius * 0.8;
        const moonZ = Math.cos(moonAngle) * sunRadius * 0.3;

        moonLight.position.set(moonX, Math.max(moonY, 10), moonZ);
        moonLight.intensity = lerp(0, 0.3, nf);

        // ── Ambient light ────────────────────────────────────
        lerpRGB(_ambRGB, AMB_DAY, AMB_NIGHT, nf);
        setColorFromRGB(ambientLight.color, _ambRGB);
        ambientLight.intensity = lerp(0.6, 0.2, nf);

        // ── Hemisphere light ─────────────────────────────────
        if (hemiLight) {
            lerpRGB(_hemiSkyRGB, HEMI_SKY_DAY, HEMI_SKY_NIGHT, nf);
            lerpRGB(_hemiGndRGB, HEMI_GND_DAY, HEMI_GND_NIGHT, nf);
            setColorFromRGB(hemiLight.color, _hemiSkyRGB);
            setColorFromRGB(hemiLight.groundColor, _hemiGndRGB);
            hemiLight.intensity = lerp(0.3, 0.1, nf);
        }

        // ── Fill light ───────────────────────────────────────
        if (fillLight) {
            fillLight.intensity = lerp(0.4, 0.1, nf);
        }

        // ── Sky / background color ───────────────────────────
        getSkyColor(timeOfDay, _skyRGB);
        scene.background.setRGB(_skyRGB[0], _skyRGB[1], _skyRGB[2]);

        // ── Fog ──────────────────────────────────────────────
        lerpRGB(_fogRGB, FOG_DAY, FOG_NIGHT, nf);
        if (scene.fog) {
            scene.fog.color.setRGB(_fogRGB[0], _fogRGB[1], _fogRGB[2]);
            // Density: slightly higher at night for atmosphere
            scene.fog.density = lerp(0.003, 0.005, nf);
        }

        // ── Bloom / Exposure ─────────────────────────────────
        const composer = window.BACCARAT.composer;
        if (composer && composer.bloomPass) {
            composer.bloomPass.strength = lerp(BLOOM_DAY, BLOOM_NIGHT, nf);
        }
        if (renderer) {
            renderer.toneMappingExposure = lerp(EXPOSURE_DAY, EXPOSURE_NIGHT, nf);
        }

        // ── Stars ────────────────────────────────────────────
        if (starMaterial) {
            // Stars visible at night, fade during dawn/dusk
            starMaterial.opacity = lerp(0, 0.9, nf);

            // Gentle twinkle via slow rotation
            if (starField) {
                starField.rotation.y = elapsedTime * 0.003;
            }
        }
    }

    // ── Register ─────────────────────────────────────────────
    window.BACCARAT.registerModule({ init, update });

})();

// === BACCARAT TABLES ===
// ============================================================
// Baccarat City — Baccarat Tables Module
// ============================================================
// Signature feature: 3D baccarat tables with card dealing
// animations, chip stacks, seated players, and warm lighting.
// Uses the module registration system from core-engine.
// ============================================================

(function () {
    'use strict';

    let THREE;

    // ── Palette ────────────────────────────────────────────────
    const FELT_GREEN   = 0x1a6b3a;
    const DARK_WOOD    = 0x3a2211;
    const BUMPER_BROWN = 0x5a3a1a;
    const CARD_WHITE   = 0xeeeeff;
    const CARD_BACK    = 0x2244aa;
    const LAMP_GOLD    = 0xd4af37;

    const CHIP_COLORS  = [0xcc2233, 0x22aa44, 0x222222, 0xd4af37];
    const PLAYER_SHIRT_COLORS = [
        0xcc3344, 0x3366bb, 0x44aa55, 0xcc9933, 0x9944aa, 0x44aaaa, 0xdd6633, 0x6644aa
    ];
    const SKIN_COLOR   = 0xdcb996;
    const DEALER_VEST  = 0x111111;
    const DEALER_SHIRT = 0xeeeeee;

    // ── Easing ─────────────────────────────────────────────────
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

    // ── Material cache ─────────────────────────────────────────
    const matCache = new Map();
    function getMat(color) {
        if (matCache.has(color)) return matCache.get(color);
        const m = new THREE.MeshToonMaterial({ color });
        matCache.set(color, m);
        return m;
    }

    // ── State durations (seconds) ──────────────────────────────
    const STATE_IDLE    = 0;
    const STATE_DEAL    = 1;
    const STATE_REVEAL  = 2;
    const STATE_RESULT  = 3;
    const STATE_CLEAR   = 4;
    const DURATIONS = [2.0, 2.0, 1.0, 2.0, 1.0]; // per state
    const CYCLE_TOTAL = DURATIONS.reduce((a, b) => a + b, 0); // 8s

    // ── Table layout constants ─────────────────────────────────
    const TABLE_W = 3.0;
    const TABLE_D = 1.5;
    const TABLE_H = 0.9;
    const TABLE_TOP_Y = TABLE_H;
    const LEG_RADIUS = 0.06;
    const LEG_HEIGHT = TABLE_H - 0.05;

    // Card positions relative to table center (on top surface)
    // Player cards on left, Banker on right
    const CARD_Y = TABLE_TOP_Y + 0.002;
    const PLAYER_CARD_POSITIONS = [
        { x: -0.5, z: 0.0 },
        { x: -0.3, z: 0.0 },
        { x: -0.1, z: 0.0 },
    ];
    const BANKER_CARD_POSITIONS = [
        { x: 0.1, z: 0.0 },
        { x: 0.3, z: 0.0 },
        { x: 0.5, z: 0.0 },
    ];
    const DEALER_POS_LOCAL = { x: 0, z: -TABLE_D * 0.55 };
    const CARD_WIDTH  = 0.06;
    const CARD_THICK  = 0.001;
    const CARD_HEIGHT = 0.08;

    // ── Table placement positions ──────────────────────────────
    // Two clusters in the central casino area
    const TABLE_POSITIONS = [
        // Cluster A (slightly southwest of center)
        { x: -8, z: -4 },
        { x: -5, z: -3 },
        { x: -8, z: -1 },
        { x: -5, z:  0 },
        // Cluster B (slightly northeast of center)
        { x:  4, z: -5 },
        { x:  7, z: -4 },
        { x:  4, z: -2 },
        { x:  7, z: -1 },
    ];

    // ── Shared geometry (created once in init) ─────────────────
    let geoTableTop, geoTableBumper, geoTableLeg;
    let geoCard, geoChip;
    let geoPlayerBody, geoPlayerHead;

    // ── All tables ─────────────────────────────────────────────
    const tables = [];

    // ── Create shared geometries ───────────────────────────────
    function createGeometries() {
        // Table top — squashed cylinder for oval look
        geoTableTop = new THREE.CylinderGeometry(1, 1, 0.05, 32);
        // Bumper ring
        geoTableBumper = new THREE.TorusGeometry(1, 0.04, 8, 32);
        // Table leg
        geoTableLeg = new THREE.CylinderGeometry(LEG_RADIUS, LEG_RADIUS, LEG_HEIGHT, 8);
        // Card
        geoCard = new THREE.BoxGeometry(CARD_WIDTH, CARD_THICK, CARD_HEIGHT);
        // Chip
        geoChip = new THREE.CylinderGeometry(0.08, 0.08, 0.03, 16);
        // Player body
        geoPlayerBody = new THREE.CylinderGeometry(0.15, 0.15, 0.5, 8);
        // Player head
        geoPlayerHead = new THREE.SphereGeometry(0.12, 8, 8);
    }

    // ── Build a single baccarat table ──────────────────────────
    function createTable(scene, pos, index) {
        const group = new THREE.Group();
        group.position.set(pos.x, 0, pos.z);

        // -- Table top (oval via scale) --
        const topMesh = new THREE.Mesh(geoTableTop, getMat(FELT_GREEN));
        topMesh.scale.set(TABLE_W * 0.5, 1, TABLE_D * 0.5);
        topMesh.position.y = TABLE_TOP_Y;
        topMesh.castShadow = true;
        topMesh.receiveShadow = true;
        group.add(topMesh);

        // -- Bumper --
        const bumperMesh = new THREE.Mesh(geoTableBumper, getMat(BUMPER_BROWN));
        bumperMesh.rotation.x = Math.PI / 2;
        bumperMesh.scale.set(TABLE_W * 0.5, TABLE_D * 0.5, 1);
        bumperMesh.position.y = TABLE_TOP_Y + 0.02;
        bumperMesh.castShadow = true;
        group.add(bumperMesh);

        // -- Legs --
        const legOffsets = [
            { x: -TABLE_W * 0.35, z: -TABLE_D * 0.3 },
            { x:  TABLE_W * 0.35, z: -TABLE_D * 0.3 },
            { x: -TABLE_W * 0.35, z:  TABLE_D * 0.3 },
            { x:  TABLE_W * 0.35, z:  TABLE_D * 0.3 },
        ];
        for (const lo of legOffsets) {
            const leg = new THREE.Mesh(geoTableLeg, getMat(DARK_WOOD));
            leg.position.set(lo.x, LEG_HEIGHT / 2, lo.z);
            leg.castShadow = true;
            group.add(leg);
        }

        // -- Dealer figure --
        const dealer = createFigure(DEALER_VEST, DEALER_SHIRT);
        dealer.position.set(DEALER_POS_LOCAL.x, 0, DEALER_POS_LOCAL.z);
        group.add(dealer);

        // -- Player figures (5-6 around the curved side) --
        const numPlayers = 4 + Math.floor(Math.random() * 3); // 4-6
        const playerFigures = [];
        for (let i = 0; i < numPlayers; i++) {
            const angle = Math.PI * 0.15 + (Math.PI * 0.7) * (i / (numPlayers - 1));
            const px = Math.cos(angle) * TABLE_W * 0.55;
            const pz = Math.sin(angle) * TABLE_D * 0.6;
            const color = PLAYER_SHIRT_COLORS[i % PLAYER_SHIRT_COLORS.length];
            const fig = createFigure(color);
            fig.position.set(px, 0, pz);
            // Face toward table center
            fig.lookAt(new THREE.Vector3(pos.x, 0, pos.z));
            fig.rotation.x = 0;
            fig.rotation.z = 0;
            group.add(fig);
            playerFigures.push(fig);
        }

        // -- Cards (start hidden, animated during deal) --
        const playerCards = [];
        const bankerCards = [];
        const numPlayerCards = Math.random() < 0.3 ? 3 : 2;
        const numBankerCards = Math.random() < 0.3 ? 3 : 2;

        for (let i = 0; i < numPlayerCards; i++) {
            const card = createCard(true); // face-down
            const cpos = PLAYER_CARD_POSITIONS[i];
            card.userData.targetX = cpos.x;
            card.userData.targetZ = cpos.z;
            card.userData.targetY = CARD_Y + i * 0.002;
            card.position.set(DEALER_POS_LOCAL.x, CARD_Y, DEALER_POS_LOCAL.z);
            card.visible = false;
            group.add(card);
            playerCards.push(card);
        }
        for (let i = 0; i < numBankerCards; i++) {
            const card = createCard(true);
            const cpos = BANKER_CARD_POSITIONS[i];
            card.userData.targetX = cpos.x;
            card.userData.targetZ = cpos.z;
            card.userData.targetY = CARD_Y + i * 0.002;
            card.position.set(DEALER_POS_LOCAL.x, CARD_Y, DEALER_POS_LOCAL.z);
            card.visible = false;
            group.add(card);
            bankerCards.push(card);
        }

        // -- Chips --
        const chipStacks = [];
        const numChipStacks = 2 + Math.floor(Math.random() * 3); // 2-4
        for (let i = 0; i < numChipStacks; i++) {
            const stackHeight = 1 + Math.floor(Math.random() * 4);
            const chipColor = CHIP_COLORS[i % CHIP_COLORS.length];
            const stack = createChipStack(stackHeight, chipColor);
            // Random position on table surface
            const angle = Math.random() * Math.PI * 2;
            const r = 0.2 + Math.random() * 0.5;
            stack.position.set(
                Math.cos(angle) * r,
                TABLE_TOP_Y + 0.025,
                Math.sin(angle) * r * 0.5
            );
            group.add(stack);
            chipStacks.push({
                mesh: stack,
                baseScale: 1,
                isWinning: Math.random() < 0.5
            });
        }

        // -- Table lamp (point light) --
        const lamp = new THREE.PointLight(LAMP_GOLD, 0.5, 5);
