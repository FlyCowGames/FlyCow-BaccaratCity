        lamp.position.set(0, TABLE_TOP_Y + 2, 0);
        lamp.castShadow = false;
        group.add(lamp);

        scene.add(group);

        // -- Table state object --
        const cycleOffset = Math.random() * CYCLE_TOTAL;
        return {
            group,
            playerCards,
            bankerCards,
            chipStacks,
            playerFigures,
            dealer,
            lamp,
            state: STATE_IDLE,
            stateTime: 0,
            cycleOffset,
            totalTime: cycleOffset,
            cardsDealt: false,
            cardsRevealed: false,
            resultApplied: false,
            clearStarted: false,
        };
    }

    // ── Create a human figure ──────────────────────────────────
    function createFigure(bodyColor, shirtColor) {
        const fig = new THREE.Group();

        // Body
        const body = new THREE.Mesh(geoPlayerBody, getMat(bodyColor));
        body.position.y = 0.55; // seated height
        body.castShadow = true;
        fig.add(body);

        // Shirt accent (if dealer has white shirt under vest)
        if (shirtColor !== undefined) {
            const shirt = new THREE.Mesh(
                new THREE.CylinderGeometry(0.13, 0.14, 0.15, 8),
                getMat(shirtColor)
            );
            shirt.position.y = 0.72;
            fig.add(shirt);
        }

        // Head
        const head = new THREE.Mesh(geoPlayerHead, getMat(SKIN_COLOR));
        head.position.y = 0.95;
        head.castShadow = true;
        fig.add(head);

        return fig;
    }

    // ── Create a card mesh ─────────────────────────────────────
    function createCard(faceDown) {
        const mat = faceDown ? getMat(CARD_BACK) : getMat(CARD_WHITE);
        const card = new THREE.Mesh(geoCard, mat);
        card.castShadow = true;
        card.userData.faceDown = faceDown;
        card.userData.flipProgress = 0;
        card.userData.dealProgress = 0;
        return card;
    }

    // ── Create a chip stack ────────────────────────────────────
    function createChipStack(height, color) {
        const stack = new THREE.Group();
        for (let i = 0; i < height; i++) {
            const chip = new THREE.Mesh(geoChip, getMat(color));
            chip.position.y = i * 0.03;
            chip.castShadow = true;
            stack.add(chip);
        }
        return stack;
    }

    // ── Reset table for a new round ────────────────────────────
    function resetTable(t) {
        t.cardsDealt = false;
        t.cardsRevealed = false;
        t.resultApplied = false;
        t.clearStarted = false;

        // Reset cards to dealer position, hidden
        const allCards = t.playerCards.concat(t.bankerCards);
        for (const c of allCards) {
            c.visible = false;
            c.position.set(DEALER_POS_LOCAL.x, CARD_Y, DEALER_POS_LOCAL.z);
            c.rotation.set(0, 0, 0);
            c.userData.dealProgress = 0;
            c.userData.flipProgress = 0;
            c.userData.faceDown = true;
            c.material = getMat(CARD_BACK);
        }

        // Reset chip scales
        for (const cs of t.chipStacks) {
            cs.mesh.scale.setScalar(cs.baseScale);
            cs.isWinning = Math.random() < 0.5;
        }
    }

    // ── Compute which state we're in based on elapsed time ─────
    function getStateFromTime(elapsed) {
        let t = elapsed % CYCLE_TOTAL;
        let accumulated = 0;
        for (let i = 0; i < DURATIONS.length; i++) {
            accumulated += DURATIONS[i];
            if (t < accumulated) {
                return { state: i, stateTime: t - (accumulated - DURATIONS[i]) };
            }
        }
        return { state: 0, stateTime: 0 };
    }

    // ── Update a single table ──────────────────────────────────
    function updateTable(t, deltaTime, elapsedTime) {
        t.totalTime += deltaTime;
        const { state, stateTime } = getStateFromTime(t.totalTime);
        const prevState = t.state;
        t.state = state;
        t.stateTime = stateTime;

        // Detect state transitions
        if (state === STATE_IDLE && prevState === STATE_CLEAR) {
            resetTable(t);
        }

        const allCards = t.playerCards.concat(t.bankerCards);

        switch (state) {
            case STATE_IDLE:
                // Players idle — subtle breathing via figures
                for (let i = 0; i < t.playerFigures.length; i++) {
                    const fig = t.playerFigures[i];
                    const breathe = Math.sin(elapsedTime * 2 + i * 1.3) * 0.01;
                    fig.position.y = breathe;
                }
                break;

            case STATE_DEAL: {
                // Make cards visible and animate them sliding from dealer to positions
                const totalCards = allCards.length;
                for (let i = 0; i < totalCards; i++) {
                    const card = allCards[i];
                    card.visible = true;

                    // Stagger: each card starts dealing 0.25s after the previous
                    const cardDelay = i * 0.25;
                    const cardDuration = 0.5;

                    if (stateTime >= cardDelay) {
                        const progress = Math.min(1, (stateTime - cardDelay) / cardDuration);
                        const eased = easeOutCubic(progress);
                        card.userData.dealProgress = eased;

                        // Lerp from dealer position to target
                        const tx = card.userData.targetX;
                        const tz = card.userData.targetZ;
                        const ty = card.userData.targetY;
                        card.position.x = DEALER_POS_LOCAL.x + (tx - DEALER_POS_LOCAL.x) * eased;
                        card.position.z = DEALER_POS_LOCAL.z + (tz - DEALER_POS_LOCAL.z) * eased;
                        card.position.y = CARD_Y + (ty - CARD_Y) * eased;

                        // Slight arc: raise in the middle of travel
                        const arc = Math.sin(progress * Math.PI) * 0.15;
                        card.position.y += arc;
                    }
                }
                break;
            }

            case STATE_REVEAL: {
                // Flip cards face-up by rotating on X axis
                for (let i = 0; i < allCards.length; i++) {
                    const card = allCards[i];
                    const flipDelay = i * 0.12;
                    const flipDuration = 0.4;

                    if (stateTime >= flipDelay) {
                        const progress = Math.min(1, (stateTime - flipDelay) / flipDuration);
                        const eased = easeInOutQuad(progress);
                        card.userData.flipProgress = eased;
                        card.rotation.x = eased * Math.PI;

                        // Swap material at halfway point
                        if (eased >= 0.5 && card.userData.faceDown) {
                            card.material = getMat(CARD_WHITE);
                            card.userData.faceDown = false;
                        }

                        // Small bounce up during flip
                        const bounce = Math.sin(progress * Math.PI) * 0.06;
                        card.position.y = card.userData.targetY + bounce;
                    }
                }
                break;
            }

            case STATE_RESULT: {
                // Winning chips grow, losing chips shrink
                const pulse = 1 + Math.sin(stateTime * 6) * 0.15;
                for (const cs of t.chipStacks) {
                    if (cs.isWinning) {
                        const targetScale = cs.baseScale * pulse * 1.3;
                        cs.mesh.scale.lerp(
                            new THREE.Vector3(targetScale, targetScale, targetScale),
                            0.1
                        );
                    } else {
                        const shrink = Math.max(0.3, 1 - stateTime * 0.4);
                        cs.mesh.scale.setScalar(cs.baseScale * shrink);
                    }
                }

                // Warm up the lamp during result
                t.lamp.intensity = 0.5 + Math.sin(stateTime * 4) * 0.2;
                break;
            }

            case STATE_CLEAR: {
                // Cards slide off the table edge
                const clearDuration = DURATIONS[STATE_CLEAR];
                const progress = Math.min(1, stateTime / (clearDuration * 0.8));
                const eased = easeOutCubic(progress);

                for (let i = 0; i < allCards.length; i++) {
                    const card = allCards[i];
                    // Slide cards toward +X (off the table)
                    const slideOffset = eased * 3.0;
                    card.position.x = card.userData.targetX + slideOffset;
                    card.position.y = card.userData.targetY - eased * 0.3;

                    // Fade by scaling down
                    const fadeScale = 1 - eased * 0.5;
                    card.scale.setScalar(Math.max(0.01, fadeScale));
                }

                // Reset lamp
                t.lamp.intensity = 0.5;

                // Reset chip scales smoothly
                for (const cs of t.chipStacks) {
                    cs.mesh.scale.lerp(
                        new THREE.Vector3(cs.baseScale, cs.baseScale, cs.baseScale),
                        0.1
                    );
                }
                break;
            }
        }
    }

    // ── Module interface ───────────────────────────────────────
    function init({ scene, camera, renderer, THREE: three }) {
        THREE = three;
        createGeometries();

        for (let i = 0; i < TABLE_POSITIONS.length; i++) {
            const t = createTable(scene, TABLE_POSITIONS[i], i);
            tables.push(t);
        }
    }

    function update(deltaTime, elapsedTime) {
        for (const t of tables) {
            updateTable(t, deltaTime, elapsedTime);
        }
    }

    // ── Register ───────────────────────────────────────────────
    if (window.BACCARAT && window.BACCARAT.registerModule) {
        window.BACCARAT.registerModule({ init, update });
    } else {
        // Fallback: wait for BACCARAT global
        const check = setInterval(() => {
            if (window.BACCARAT && window.BACCARAT.registerModule) {
                clearInterval(check);
                window.BACCARAT.registerModule({ init, update });
            }
        }, 100);
    }
})();

// === CINEMATIC CAMERA ===
// ============================================================
// Baccarat City — Cinematic Flythrough Camera Module
// ============================================================
// Replaces the static isometric OrthographicCamera with a
// PerspectiveCamera and drives it through a multi-phase
// cinematic sequence: aerial approach, street-level flythrough,
// casino approach, lounge entry, then hands off to free-roam.
// ============================================================

(function () {
    'use strict';

    // We'll grab THREE from the BACCARAT namespace at init time
    let THREE;

    // ── Easing Functions ─────────────────────────────────────────
    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function easeInOutQuad(t) {
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function easeOutQuad(t) {
        return 1 - (1 - t) * (1 - t);
    }

    function smoothstep(edge0, edge1, x) {
        const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
        return t * t * (3 - 2 * t);
    }

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    // ── Phase Timing ─────────────────────────────────────────────
    const PHASE_AERIAL    = { start: 0,  end: 8  };
    const PHASE_STREET    = { start: 8,  end: 25 };
    const PHASE_CASINO    = { start: 25, end: 32 };
    const PHASE_LOUNGE    = { start: 32, end: 40 };
    const CINEMATIC_END   = 40;

    // ── State ────────────────────────────────────────────────────
    let perspCamera;
    let scene;
    let composer;
    let renderer;
    let cinematicTime = 0;
    let cinematicActive = true;
    let freeRoamActive = false;
    let currentPhase = 'aerial';

    // Free-roam orbit state
    let orbitAngle = 0;
    let orbitRadius = 8;
    let orbitHeight = 3;
    let orbitTarget = null; // set after cinematic ends
    let orbitDragging = false;
    let orbitLastX = 0;
    let orbitLastY = 0;
    let orbitZoom = 8;

    // Camera shake state
    let shakeIntensity = 0;

    // Replay button element
    let replayBtn = null;

    // Original input handlers — we suppress them during cinematic
    let inputSuppressed = false;

    // ── Street-Level Spline Path ─────────────────────────────────
    // Road centers at multiples of 12, from -96 to +96.
    // Path: NE edge along x=0,z=-96 → south along x=0 → turn west
    //       at z=-36 → west to x=-36 → turn south to z=0 → curve to origin.
    //
    // We define waypoints; CatmullRomCurve3 interpolates smoothly.

    let streetPath;
    let streetPathLength;

    function buildStreetPath() {
        const pts = [
            // Entry point — northeast edge, high on the road
            new THREE.Vector3(0, 3, -100),
            // Fly south along x=0 road
            new THREE.Vector3(0, 3, -84),
            new THREE.Vector3(0, 3, -72),
            new THREE.Vector3(0, 3, -60),
            new THREE.Vector3(0, 3, -48),
            // Approaching the turn at z=-36
            new THREE.Vector3(0, 3, -40),
            // The turn — curve west
            new THREE.Vector3(-3, 3, -36),
            new THREE.Vector3(-12, 3, -36),
            new THREE.Vector3(-24, 3, -36),
            // Arriving at x=-36 intersection
            new THREE.Vector3(-34, 3, -36),
            // Turn south
            new THREE.Vector3(-36, 3, -33),
            new THREE.Vector3(-36, 3, -24),
            new THREE.Vector3(-36, 3, -12),
            // Approaching city center
            new THREE.Vector3(-36, 3, -4),
            // Curve toward origin (casino district)
            new THREE.Vector3(-30, 3.5, -1),
            new THREE.Vector3(-20, 4, 0),
            new THREE.Vector3(-10, 5, 0),
            // Near center — slight rise for casino approach
            new THREE.Vector3(-4, 6, 2),
            new THREE.Vector3(0, 7, 3),
        ];

        streetPath = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.3);
        streetPathLength = streetPath.getLength();
    }

    // ── Aerial Approach Path ─────────────────────────────────────
    let aerialPath;

    function buildAerialPath() {
        const pts = [
            new THREE.Vector3(180, 160, 180),   // far away, bird's eye
            new THREE.Vector3(120, 110, 120),
            new THREE.Vector3(60, 60, 60),
            new THREE.Vector3(20, 25, 10),
            new THREE.Vector3(0, 8, -96),       // transition to street entry
        ];
        aerialPath = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
    }

    // ── Casino Approach Path ─────────────────────────────────────
    let casinoPath;

    function buildCasinoPath() {
        const pts = [
            new THREE.Vector3(0, 7, 3),         // from end of street phase
            new THREE.Vector3(3, 6.5, 4),
            new THREE.Vector3(5, 6, 3),
            new THREE.Vector3(4, 5.5, 1),
            new THREE.Vector3(2, 5, 0),
            new THREE.Vector3(0, 4, -1),
        ];
        casinoPath = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
    }

    // ── Lounge Entry Path ────────────────────────────────────────
    let loungePath;

    function buildLoungePath() {
        const pts = [
            new THREE.Vector3(0, 4, -1),        // from casino approach end
            new THREE.Vector3(-1, 3.2, -0.5),
            new THREE.Vector3(-1.5, 2.5, 0),
            new THREE.Vector3(-1, 2, 0.5),
            new THREE.Vector3(0, 1.8, 1),       // settle near table height
        ];
        loungePath = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
    }

    // ── FOV Interpolation ────────────────────────────────────────
    function getTargetFOV(time) {
        if (time < PHASE_AERIAL.end) {
            // Aerial: 60
            return 60;
        } else if (time < PHASE_STREET.end) {
            // Street: narrow to 45 during middle, widen at edges
            const t = (time - PHASE_STREET.start) / (PHASE_STREET.end - PHASE_STREET.start);
            if (t < 0.15) {
                return lerp(60, 45, easeInOutQuad(t / 0.15));
            } else if (t > 0.85) {
                return lerp(45, 55, easeInOutQuad((t - 0.85) / 0.15));
            }
            return 45;
        } else if (time < PHASE_CASINO.end) {
            // Casino reveal: widen to 55
            return 55;
        } else {
            // Lounge + free roam: 50
            const t = Math.min(1, (time - PHASE_LOUNGE.start) / (PHASE_LOUNGE.end - PHASE_LOUNGE.start));
            return lerp(55, 50, easeInOutQuad(t));
        }
    }

    // ── Camera Shake ─────────────────────────────────────────────
    function getCameraShake(time) {
        if (time < PHASE_STREET.start || time > PHASE_STREET.end) {
            return { x: 0, y: 0, z: 0 };
        }
        // Subtle sway during street flythrough
        const intensity = 0.03;
        return {
            x: Math.sin(time * 3.7) * intensity + Math.sin(time * 7.3) * intensity * 0.4,
            y: Math.cos(time * 2.9) * intensity * 0.5 + Math.sin(time * 5.1) * intensity * 0.3,
            z: Math.sin(time * 4.3) * intensity * 0.3,
        };
    }

    // ── Speed Variation for Street Phase ─────────────────────────
    // Slower through intersections (at z multiples of 12), faster on straights
    function getStreetSpeedMultiplier(pathT) {
        const pt = streetPath.getPointAt(pathT);
        // Check proximity to intersections (grid lines at multiples of 12)
        const xGrid = Math.abs(pt.x % 12);
        const zGrid = Math.abs(pt.z % 12);
        const nearIntersection = Math.min(xGrid, 12 - xGrid) < 2 && Math.min(zGrid, 12 - zGrid) < 2;

        if (nearIntersection) {
            return 0.6; // slow down at intersections
        }
        return 1.0;
    }

    // ── Phase Update Functions ───────────────────────────────────

    function updateAerial(time) {
        const duration = PHASE_AERIAL.end - PHASE_AERIAL.start;
        const t = easeInOutCubic(Math.min(1, (time - PHASE_AERIAL.start) / duration));

        const pos = aerialPath.getPointAt(t);
        const shake = getCameraShake(time);
        perspCamera.position.set(pos.x + shake.x, pos.y + shake.y, pos.z + shake.z);

        // Look toward city center, with look-ahead
        const lookT = Math.min(1, t + 0.1);
        const lookPt = aerialPath.getPointAt(lookT);
        // Bias the look target downward toward the city
        const lookTarget = new THREE.Vector3(
            lerp(lookPt.x, 0, 0.5),
            lerp(lookPt.y, 0, 0.7),
            lerp(lookPt.z, 0, 0.5)
        );
        perspCamera.lookAt(lookTarget);
    }

    function updateStreet(time) {
        const duration = PHASE_STREET.end - PHASE_STREET.start;
        const rawT = (time - PHASE_STREET.start) / duration;
        const t = easeInOutQuad(Math.min(1, rawT));

        const pos = streetPath.getPointAt(t);
        const shake = getCameraShake(time);
        perspCamera.position.set(pos.x + shake.x, pos.y + shake.y, pos.z + shake.z);

        // Look-ahead along the spline for forward-looking camera
        const lookAheadT = Math.min(1, t + 0.05);
        const lookPt = streetPath.getPointAt(lookAheadT);

        // Slight upward bias so we see building tops
        const lookTarget = new THREE.Vector3(lookPt.x, lookPt.y + 0.5, lookPt.z);
        perspCamera.lookAt(lookTarget);
    }

    function updateCasino(time) {
        const duration = PHASE_CASINO.end - PHASE_CASINO.start;
        const t = easeInOutCubic(Math.min(1, (time - PHASE_CASINO.start) / duration));

        const pos = casinoPath.getPointAt(t);
        const shake = getCameraShake(time);
        perspCamera.position.set(pos.x + shake.x, pos.y + shake.y, pos.z + shake.z);

        // Look toward the casino center (origin area)
        const lookTarget = new THREE.Vector3(0, 2, 0);
        perspCamera.lookAt(lookTarget);
    }

    function updateLounge(time) {
        const duration = PHASE_LOUNGE.end - PHASE_LOUNGE.start;
        const t = easeInOutCubic(Math.min(1, (time - PHASE_LOUNGE.start) / duration));

        const pos = loungePath.getPointAt(t);
        perspCamera.position.set(pos.x, pos.y, pos.z);

        // Look at table cluster center
        const lookTarget = new THREE.Vector3(0, 1, 0);
        perspCamera.lookAt(lookTarget);

        // At the very end, start the gentle orbit
        if (t > 0.95) {
            const orbitBlend = (t - 0.95) / 0.05;
            orbitAngle = Math.atan2(pos.z, pos.x) * (1 - orbitBlend);
        }
    }

    function updateFreeRoam(delta) {
        if (!orbitDragging) {
            orbitAngle += delta * 0.15; // slow auto-orbit
        }

        const x = orbitTarget.x + Math.cos(orbitAngle) * orbitZoom;
        const z = orbitTarget.z + Math.sin(orbitAngle) * orbitZoom;
        const y = orbitTarget.y + orbitHeight;

        perspCamera.position.set(x, y, z);
        perspCamera.lookAt(orbitTarget);
    }

    // ── Input Handling for Free Roam ─────────────────────────────
    function onPointerDownFreeRoam(e) {
        if (!freeRoamActive) return;
        orbitDragging = true;
        orbitLastX = e.clientX;
        orbitLastY = e.clientY;
    }

    function onPointerMoveFreeRoam(e) {
        if (!freeRoamActive || !orbitDragging) return;
        const dx = e.clientX - orbitLastX;
        const dy = e.clientY - orbitLastY;
        orbitLastX = e.clientX;
        orbitLastY = e.clientY;

        orbitAngle -= dx * 0.005;
        orbitHeight = Math.max(1.5, Math.min(15, orbitHeight + dy * 0.05));
    }

    function onPointerUpFreeRoam() {
        orbitDragging = false;
    }

    function onWheelFreeRoam(e) {
        if (!freeRoamActive) return;
        e.preventDefault();
        const delta = Math.sign(e.deltaY);
        orbitZoom = Math.max(3, Math.min(25, orbitZoom + delta * 0.5));
    }

    function onDblClickFreeRoam() {
        if (!freeRoamActive) return;
        replayCinematic();
    }

    // ── Suppress Core Engine Input ───────────────────────────────
    function suppressCoreInput() {
        if (inputSuppressed) return;
        inputSuppressed = true;
        // Intercept events on the canvas to prevent core engine's pan/zoom
        const canvas = renderer.domElement;
        canvas.addEventListener('pointerdown', blockEvent, true);
        canvas.addEventListener('pointermove', blockEvent, true);
        canvas.addEventListener('pointerup', blockEvent, true);
        canvas.addEventListener('wheel', blockEvent, { capture: true, passive: false });
    }

    function releaseCoreInput() {
        if (!inputSuppressed) return;
        inputSuppressed = false;
        const canvas = renderer.domElement;
        canvas.removeEventListener('pointerdown', blockEvent, true);
        canvas.removeEventListener('pointermove', blockEvent, true);
        canvas.removeEventListener('pointerup', blockEvent, true);
        canvas.removeEventListener('wheel', blockEvent, true);
    }

    function blockEvent(e) {
        e.stopPropagation();
        // During cinematic: block everything
        // During free-roam: let our own handlers work but block core engine
        if (cinematicActive) {
            e.preventDefault();
        }
    }

    // ── Replay ───────────────────────────────────────────────────
    function replayCinematic() {
        cinematicTime = 0;
        cinematicActive = true;
        freeRoamActive = false;
        currentPhase = 'aerial';

        if (replayBtn) {
            replayBtn.style.opacity = '0';
            replayBtn.style.pointerEvents = 'none';
        }

        // Update zoom hint text
        const zoomHint = document.getElementById('zoomHint');
        if (zoomHint) {
            zoomHint.textContent = 'cinematic flythrough...';
            zoomHint.style.opacity = '0.5';
        }

        suppressCoreInput();
    }

    // ── Create Replay Button ─────────────────────────────────────
    function createReplayButton() {
        replayBtn = document.createElement('button');
        replayBtn.id = 'cinematicReplay';
        replayBtn.innerHTML = '&#9654; Replay Flythrough';
        replayBtn.style.cssText = `
            position: fixed;
            bottom: 2vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: rgba(212, 175, 55, 0.8);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 4px;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            opacity: 0;
            pointer-events: none;
        `;
        replayBtn.addEventListener('mouseenter', () => {
            replayBtn.style.background = 'rgba(212, 175, 55, 0.3)';
            replayBtn.style.borderColor = 'rgba(212, 175, 55, 0.7)';
            replayBtn.style.color = 'rgba(212, 175, 55, 1)';
        });
        replayBtn.addEventListener('mouseleave', () => {
            replayBtn.style.background = 'rgba(212, 175, 55, 0.15)';
            replayBtn.style.borderColor = 'rgba(212, 175, 55, 0.4)';
            replayBtn.style.color = 'rgba(212, 175, 55, 0.8)';
        });
        replayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            replayCinematic();
        });
        document.body.appendChild(replayBtn);
    }

    // ── Transition to Free Roam ──────────────────────────────────
    function enterFreeRoam() {
        cinematicActive = false;
        freeRoamActive = true;

        // Set orbit target to table cluster center
        orbitTarget = new THREE.Vector3(0, 1, 0);
        orbitAngle = Math.atan2(perspCamera.position.z - orbitTarget.z,
                                perspCamera.position.x - orbitTarget.x);
        orbitZoom = 8;
        orbitHeight = 3;

        // Show replay button
        if (replayBtn) {
            replayBtn.style.opacity = '1';
            replayBtn.style.pointerEvents = 'auto';
        }

        // Update zoom hint
        const zoomHint = document.getElementById('zoomHint');
        if (zoomHint) {
            zoomHint.textContent = 'drag to orbit · scroll to zoom · double-click to replay';
            zoomHint.style.opacity = '0.25';
        }

        // Release suppressed input and bind free-roam handlers
        // Keep core input suppressed since we handle our own orbit
        // but stop blocking events — redirect to free-roam handlers
        const canvas = renderer.domElement;
        canvas.addEventListener('pointerdown', onPointerDownFreeRoam);
        window.addEventListener('pointermove', onPointerMoveFreeRoam);
        window.addEventListener('pointerup', onPointerUpFreeRoam);
        canvas.addEventListener('wheel', onWheelFreeRoam, { passive: false });
        canvas.addEventListener('dblclick', onDblClickFreeRoam);
    }

    // ── Phase Label (optional cinematic progress) ────────────────
    function getPhaseLabel(time) {
        if (time < PHASE_AERIAL.end) return 'aerial';
        if (time < PHASE_STREET.end) return 'street';
        if (time < PHASE_CASINO.end) return 'casino';
        if (time < PHASE_LOUNGE.end) return 'lounge';
        return 'free';
    }

    // ── Module Interface ─────────────────────────────────────────

    function init(ctx) {
        scene = ctx.scene;
        renderer = ctx.renderer;
        THREE = ctx.THREE;

        // Build all spline paths
        buildStreetPath();
        buildAerialPath();
        buildCasinoPath();
        buildLoungePath();

        // Create PerspectiveCamera to replace the OrthographicCamera
        const aspect = window.innerWidth / window.innerHeight;
        perspCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
        perspCamera.position.set(180, 160, 180);
        perspCamera.lookAt(0, 0, 0);

        // Swap the camera in the composer's RenderPass
        composer = window.BACCARAT.composer;
        if (composer && composer.passes) {
            for (let i = 0; i < composer.passes.length; i++) {
                const pass = composer.passes[i];
                if (pass.camera) {
                    pass.camera = perspCamera;
                }
            }
        }

        // Handle window resize for perspective camera
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            perspCamera.aspect = w / h;
            perspCamera.updateProjectionMatrix();
        });

        // Create UI
        createReplayButton();

        // Update zoom hint during cinematic
        const zoomHint = document.getElementById('zoomHint');
        if (zoomHint) {
            zoomHint.textContent = 'cinematic flythrough...';
            zoomHint.style.opacity = '0.5';
        }

        // Suppress core engine's input during cinematic
        suppressCoreInput();

        // Reduce fog density for perspective view — gives better depth
        if (scene.fog) {
            scene.fog.density = 0.006;
        }

        console.log(
            '%c Baccarat City %c Cinematic Module Online ',
            'background:#d4af37;color:#0a0a12;font-weight:bold;padding:2px 6px;border-radius:3px 0 0 3px;',
            'background:#1a1a2e;color:#d4af37;font-weight:bold;padding:2px 6px;border-radius:0 3px 3px 0;'
        );
    }

    function update(delta, elapsed) {
        if (!perspCamera) return;

        if (cinematicActive) {
            cinematicTime += delta;

            // Update FOV smoothly
            const targetFOV = getTargetFOV(cinematicTime);
            perspCamera.fov = lerp(perspCamera.fov, targetFOV, 0.05);
            perspCamera.updateProjectionMatrix();

            // Determine current phase and update camera
            const phase = getPhaseLabel(cinematicTime);
            if (phase !== currentPhase) {
                currentPhase = phase;
            }

            if (cinematicTime < PHASE_AERIAL.end) {
                updateAerial(cinematicTime);
            } else if (cinematicTime < PHASE_STREET.end) {
                updateStreet(cinematicTime);
            } else if (cinematicTime < PHASE_CASINO.end) {
                updateCasino(cinematicTime);
            } else if (cinematicTime < PHASE_LOUNGE.end) {
                updateLounge(cinematicTime);
            } else {
                // Cinematic complete — transition to free roam
                enterFreeRoam();
            }
        } else if (freeRoamActive) {
            updateFreeRoam(delta);
            perspCamera.updateProjectionMatrix();
        }
    }

    // ── Register Module ──────────────────────────────────────────
    if (window.BACCARAT && window.BACCARAT.registerModule) {
        window.BACCARAT.registerModule({ init, update });
    } else {
        document.addEventListener('DOMContentLoaded', () => {
            if (window.BACCARAT && window.BACCARAT.registerModule) {
                window.BACCARAT.registerModule({ init, update });
            }
        });
    }

})();

// === SPECTACLE EFFECTS ===
// ============================================================
// Baccarat City — Spectacle: Visual Effects & Wow Factor
// ============================================================
// Harbor water, casino light beams, fireworks, fountains,
// floating lanterns, and enhanced neon flickering. Transforms
// the technically correct scene into a living, breathing
// Macau-inspired spectacle.
// ============================================================

(function () {
    'use strict';

    // ── Grid constants (match city-geometry) ─────────────────
    const CELL_SIZE   = 12;
    const GRID_COUNT  = 17;
    const HALF_GRID   = 8;
    const CITY_EXTENT = 102;

    // ── Shared ──────────────────────────────────────────────
    let THREE, scene;

    // ════════════════════════════════════════════════════════════
    //  1. WATER / HARBOR
    // ════════════════════════════════════════════════════════════

    let waterMesh = null;
    let waterGeo  = null;
    let waterBaseY = [];       // store original Y positions for wave animation
    const boats   = [];

    function createHarbor() {
        // Water plane south of city (z > 80)
        const waterW = 260;
        const waterD = 100;
        const segsX  = 64;
        const segsZ  = 32;

        waterGeo = new THREE.PlaneGeometry(waterW, waterD, segsX, segsZ);
        waterGeo.rotateX(-Math.PI / 2);

        // Store base Y positions
        const posAttr = waterGeo.getAttribute('position');
        waterBaseY = new Float32Array(posAttr.count);
        for (let i = 0; i < posAttr.count; i++) {
            waterBaseY[i] = posAttr.getY(i);
        }

        const waterMat = new THREE.MeshPhongMaterial({
            color:     0x0a1a3a,
            emissive:  0x001122,
            shininess: 120,
            transparent: true,
            opacity:   0.85,
            side:      THREE.DoubleSide,
        });

        waterMesh = new THREE.Mesh(waterGeo, waterMat);
        waterMesh.position.set(0, -0.3, 80 + waterD / 2);
        waterMesh.receiveShadow = true;
        scene.add(waterMesh);

        // Boats
        createBoats();
    }

    function createBoats() {
        const boatDefs = [
            { x: -40, z: 110, scale: 1.0, speed: 0.8 },
            { x:  20, z: 130, scale: 0.7, speed: 0.5 },
            { x:  60, z: 105, scale: 1.2, speed: 0.6 },
            { x: -10, z: 145, scale: 0.6, speed: 1.0 },
        ];

        for (const def of boatDefs) {
            const boat = new THREE.Group();

            // Hull
            const hullGeo = new THREE.BoxGeometry(1.2 * def.scale, 0.4 * def.scale, 3.0 * def.scale);
            const hullMat = new THREE.MeshToonMaterial({ color: 0x553322 });
            const hull = new THREE.Mesh(hullGeo, hullMat);
            hull.position.y = 0.1;
            boat.add(hull);

            // Cabin
            const cabinGeo = new THREE.BoxGeometry(0.7 * def.scale, 0.5 * def.scale, 1.0 * def.scale);
            const cabinMat = new THREE.MeshToonMaterial({ color: 0xeeeecc });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 0.45 * def.scale, -0.3 * def.scale);
            boat.add(cabin);

            // Mast / antenna
            const mastGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.2 * def.scale, 4);
            const mastMat = new THREE.MeshToonMaterial({ color: 0x888888 });
            const mast = new THREE.Mesh(mastGeo, mastMat);
            mast.position.set(0, 0.9 * def.scale, 0);
            boat.add(mast);

            // Running light
            const lightGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
            const lightMat = new THREE.MeshBasicMaterial({
                color: 0xff2222, toneMapped: false,
            });
            const light = new THREE.Mesh(lightGeo, lightMat);
            light.position.set(0, 1.5 * def.scale, 0);
            boat.add(light);

            boat.position.set(def.x, 0, def.z);
            boat.rotation.y = Math.random() * Math.PI * 2;
            scene.add(boat);

            boats.push({
                mesh: boat,
                baseX: def.x,
                baseZ: def.z,
                speed: def.speed,
                phase: Math.random() * Math.PI * 2,
            });
        }
    }

    function updateWater(dt, elapsed) {
        if (!waterMesh) return;

        // Animate water vertices
        const posAttr = waterGeo.getAttribute('position');
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getZ(i);
            const wave1 = Math.sin(x * 0.08 + elapsed * 1.2) * 0.4;
            const wave2 = Math.sin(z * 0.12 + elapsed * 0.8) * 0.25;
            const wave3 = Math.sin((x + z) * 0.06 + elapsed * 1.5) * 0.15;
            posAttr.setY(i, waterBaseY[i] + wave1 + wave2 + wave3);
        }
        posAttr.needsUpdate = true;
        waterGeo.computeVertexNormals();

        // Animate boats — gentle bobbing and slow drift
        for (const b of boats) {
            const bob = Math.sin(elapsed * 1.5 + b.phase) * 0.3;
            b.mesh.position.y = bob;
            b.mesh.rotation.z = Math.sin(elapsed * 0.7 + b.phase) * 0.05;
            b.mesh.rotation.x = Math.sin(elapsed * 0.5 + b.phase * 1.3) * 0.03;

            // Slow lateral drift
            b.mesh.position.x = b.baseX + Math.sin(elapsed * 0.1 * b.speed + b.phase) * 5;
        }
    }

    // ════════════════════════════════════════════════════════════
    //  2. CASINO LIGHT BEAMS
    // ════════════════════════════════════════════════════════════

    const lightBeams = [];

    function createLightBeams() {
        const beamDefs = [
            { x:  0,  z:  0, height: 200, radius: 1.5, color: 0xd4af37, rotSpeed:  0.15 },
            { x: 12,  z:  0, height: 160, radius: 1.2, color: 0xffffff, rotSpeed: -0.20 },
            { x: -12, z:  0, height: 170, radius: 1.0, color: 0xffe8b0, rotSpeed:  0.12 },
            { x:  0,  z: 12, height: 150, radius: 1.3, color: 0xd4af37, rotSpeed: -0.18 },
            { x:  0,  z:-12, height: 180, radius: 1.1, color: 0xffffff, rotSpeed:  0.22 },
            { x: 12,  z: 12, height: 140, radius: 1.0, color: 0xffe8b0, rotSpeed: -0.10 },
        ];

        for (const def of beamDefs) {
            const geo = new THREE.CylinderGeometry(def.radius * 0.3, def.radius, def.height, 8, 1, true);
            const mat = new THREE.MeshBasicMaterial({
                color:       def.color,
                transparent: true,
                opacity:     0.12,
                blending:    THREE.AdditiveBlending,
                side:        THREE.DoubleSide,
                depthWrite:  false,
                toneMapped:  false,
            });

            const beam = new THREE.Mesh(geo, mat);
            beam.position.set(def.x, def.height / 2 + 40, def.z);
            scene.add(beam);

            lightBeams.push({
                mesh:     beam,
                rotSpeed: def.rotSpeed,
                baseOpacity: 0.12,
            });
        }
    }

    function updateLightBeams(dt, elapsed) {
        for (const b of lightBeams) {
            b.mesh.rotation.y += b.rotSpeed * dt;
            // Subtle opacity pulsing
            b.mesh.material.opacity = b.baseOpacity + Math.sin(elapsed * 0.5 + b.rotSpeed * 10) * 0.03;
        }
    }

    // ════════════════════════════════════════════════════════════
    //  3. FIREWORKS (night only)
    // ════════════════════════════════════════════════════════════

    const FIREWORK_PARTICLE_COUNT = 250;
    const FIREWORK_COLORS = [0xd4af37, 0xff2244, 0x2266ff, 0x22ff66, 0xffffff];
    const FIREWORK_LAUNCH_POINTS = [
        { x:  0, z:  0 },
        { x: 12, z:  0 },
        { x:-12, z:  0 },
        { x:  0, z: 12 },
        { x:  0, z:-12 },
    ];

    let fireworkParticles = [];
    let fireworkBursts    = [];
    let fireworkTimer     = 5; // first burst after 5s of night
    let fireworkGeo       = null;
    let fireworkMats      = {};

    // Particle states: 'idle' | 'launch' | 'burst' | 'fade'
    function createFireworkSystem() {
        fireworkGeo = new THREE.SphereGeometry(0.2, 4, 3);

        // Pre-create materials for each color
        for (const c of FIREWORK_COLORS) {
            fireworkMats[c] = new THREE.MeshBasicMaterial({
                color:      c,
                toneMapped: false,
                transparent: true,
                opacity:    1.0,
                blending:   THREE.AdditiveBlending,
                depthWrite: false,
            });
        }

        // Create particle pool
        for (let i = 0; i < FIREWORK_PARTICLE_COUNT; i++) {
            const mat = fireworkMats[FIREWORK_COLORS[0]].clone();
            const mesh = new THREE.Mesh(fireworkGeo, mat);
            mesh.visible = false;
            scene.add(mesh);

            fireworkParticles.push({
                mesh,
                state: 'idle',
                vx: 0, vy: 0, vz: 0,
                life: 0,
                maxLife: 0,
            });
        }
    }

    function launchFireworkBurst() {
        // Find idle particles
        const idleParticles = [];
        for (const p of fireworkParticles) {
            if (p.state === 'idle') idleParticles.push(p);
            if (idleParticles.length >= 50) break;
        }
        if (idleParticles.length < 20) return; // not enough particles

        const launch = FIREWORK_LAUNCH_POINTS[Math.floor(Math.random() * FIREWORK_LAUNCH_POINTS.length)];
        const color  = FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)];
        const burstHeight = 60 + Math.random() * 40;
        const particleCount = 25 + Math.floor(Math.random() * 25);

        const burst = {
            x: launch.x + (Math.random() - 0.5) * 10,
            z: launch.z + (Math.random() - 0.5) * 10,
            targetY: burstHeight,
            color,
            phase: 'launch',
            launchY: 40, // start from rooftop height
            launchSpeed: 60 + Math.random() * 20,
            particles: idleParticles.slice(0, particleCount),
            timer: 0,
        };

        // Set up the lead particle (first one) as the launcher
        const lead = burst.particles[0];
        lead.state = 'launch';
        lead.mesh.visible = true;
        lead.mesh.position.set(burst.x, burst.launchY, burst.z);
        lead.mesh.material.color.setHex(color);
        lead.mesh.material.opacity = 1.0;
        lead.mesh.scale.set(1.5, 1.5, 1.5);
        lead.vy = burst.launchSpeed;
        lead.vx = 0;
        lead.vz = 0;
        lead.life = 0;
        lead.maxLife = (burst.targetY - burst.launchY) / burst.launchSpeed + 0.2;

        fireworkBursts.push(burst);
    }

    function updateFireworks(dt, elapsed) {
        const isNight = window.BACCARAT && window.BACCARAT.isNight;
        if (!isNight) {
            // Reset timer, hide all particles
            fireworkTimer = 3 + Math.random() * 5;
            for (const p of fireworkParticles) {
                if (p.state !== 'idle') {
                    p.state = 'idle';
                    p.mesh.visible = false;
                }
            }
            fireworkBursts.length = 0;
            return;
        }

        // Launch timer
        fireworkTimer -= dt;
        if (fireworkTimer <= 0) {
            // Launch 3-5 bursts staggered
            const burstCount = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < burstCount; i++) {
                // Stagger slightly using timer offsets in burst objects
                setTimeout(() => launchFireworkBurst(), i * 300);
            }
            fireworkTimer = 8 + Math.random() * 7;
        }

        // Update bursts
        const gravity = -25;

        for (let bi = fireworkBursts.length - 1; bi >= 0; bi--) {
            const burst = fireworkBursts[bi];

            if (burst.phase === 'launch') {
                const lead = burst.particles[0];
                lead.life += dt;
                lead.mesh.position.y += lead.vy * dt;
                lead.vy += gravity * 0.3 * dt; // slight gravity on launcher

                // Trail sparkle
                lead.mesh.material.opacity = 0.8 + Math.sin(elapsed * 30) * 0.2;

                // Time to explode?
                if (lead.life >= lead.maxLife || lead.vy <= 5) {
                    burst.phase = 'explode';
                    const burstPos = lead.mesh.position.clone();

                    // Explode all particles outward
                    for (let pi = 0; pi < burst.particles.length; pi++) {
                        const p = burst.particles[pi];
                        p.state = 'burst';
                        p.mesh.visible = true;
                        p.mesh.position.copy(burstPos);
                        p.mesh.material.color.setHex(burst.color);
                        p.mesh.material.opacity = 1.0;
                        p.mesh.scale.set(1, 1, 1);

                        // Random spherical explosion velocity
                        const theta = Math.random() * Math.PI * 2;
                        const phi   = Math.random() * Math.PI;
                        const speed = 15 + Math.random() * 20;
                        p.vx = Math.sin(phi) * Math.cos(theta) * speed;
                        p.vy = Math.sin(phi) * Math.sin(theta) * speed * 0.8 + 5; // bias upward
                        p.vz = Math.cos(phi) * speed;
                        p.life = 0;
                        p.maxLife = 1.5 + Math.random() * 1.0;
                    }
                }
            } else if (burst.phase === 'explode') {
                let allDead = true;
                for (const p of burst.particles) {
                    if (p.state !== 'burst') continue;

                    p.life += dt;
                    p.mesh.position.x += p.vx * dt;
                    p.mesh.position.y += p.vy * dt;
                    p.mesh.position.z += p.vz * dt;
                    p.vy += gravity * dt;

                    // Drag
                    p.vx *= 0.98;
                    p.vz *= 0.98;

                    // Fade
                    const lifeRatio = p.life / p.maxLife;
                    p.mesh.material.opacity = Math.max(0, 1 - lifeRatio);
                    p.mesh.scale.setScalar(Math.max(0.2, 1 - lifeRatio * 0.7));

                    if (p.life >= p.maxLife) {
                        p.state = 'idle';
                        p.mesh.visible = false;
                    } else {
                        allDead = false;
                    }
                }

                if (allDead) {
                    fireworkBursts.splice(bi, 1);
                }
            }
        }
    }

    // ════════════════════════════════════════════════════════════
    //  4. ANIMATED FOUNTAINS
    // ════════════════════════════════════════════════════════════

    const FOUNTAIN_PARTICLE_COUNT = 60; // per fountain
    const fountains = [];

    function createFountain(fx, fz) {
        const fountain = {
            x: fx,
            z: fz,
            particles: [],
            poolMesh: null,
        };

        // Base pool — flat cylinder with water material
        const poolGeo = new THREE.CylinderGeometry(3, 3, 0.4, 16);
        const poolMat = new THREE.MeshPhongMaterial({
            color:     0x0a2a4a,
            emissive:  0x001122,
            shininess: 100,
            transparent: true,
            opacity:   0.8,
        });
        fountain.poolMesh = new THREE.Mesh(poolGeo, poolMat);
        fountain.poolMesh.position.set(fx, 0.2, fz);
        scene.add(fountain.poolMesh);

        // Stone rim
        const rimGeo = new THREE.CylinderGeometry(3.2, 3.2, 0.6, 16);
        const rimMat = new THREE.MeshToonMaterial({ color: 0x888877 });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.position.set(fx, 0.1, fz);
        scene.add(rim);

        // Inner pool (slightly smaller to create rim effect)
        const innerGeo = new THREE.CylinderGeometry(2.8, 2.8, 0.5, 16);
        const innerPool = new THREE.Mesh(innerGeo, poolMat);
        innerPool.position.set(fx, 0.25, fz);
        scene.add(innerPool);

        // Center pedestal
        const pedestalGeo = new THREE.CylinderGeometry(0.3, 0.5, 1.5, 8);
        const pedestalMat = new THREE.MeshToonMaterial({ color: 0x999988 });
        const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        pedestal.position.set(fx, 0.75, fz);
        scene.add(pedestal);

        // Spray particles
        const particleGeo = new THREE.SphereGeometry(0.08, 4, 3);
        const particleMat = new THREE.MeshBasicMaterial({
            color:      0x88ccff,
            toneMapped: false,
            transparent: true,
            opacity:    0.7,
            blending:   THREE.AdditiveBlending,
            depthWrite: false,
        });

        for (let i = 0; i < FOUNTAIN_PARTICLE_COUNT; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat.clone());
            mesh.position.set(fx, 1.5, fz);
            scene.add(mesh);

            const p = {
                mesh,
                vx: 0, vy: 0, vz: 0,
                life: 0,
                maxLife: 0,
            };
            resetFountainParticle(p, fx, fz);
            // Stagger initial life so they don't all launch at once
            p.life = Math.random() * p.maxLife;
            fountain.particles.push(p);
        }

        fountains.push(fountain);
    }

    function resetFountainParticle(p, fx, fz) {
        // Launch from center pedestal top
        const angle  = Math.random() * Math.PI * 2;
        const spread = 0.5 + Math.random() * 1.5;
        p.mesh.position.set(fx, 1.5, fz);
        p.vx = Math.cos(angle) * spread;
        p.vy = 8 + Math.random() * 5;
        p.vz = Math.sin(angle) * spread;
        p.life    = 0;
        p.maxLife = 1.0 + Math.random() * 0.6;
        p.mesh.material.opacity = 0.7;
        p.mesh.visible = true;
    }

    function updateFountains(dt) {
        const gravity = -18;
        for (const f of fountains) {
            for (const p of f.particles) {
                p.life += dt;
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.vy += gravity * dt;

                // Fade as it falls
                const lifeRatio = p.life / p.maxLife;
                p.mesh.material.opacity = Math.max(0, 0.7 * (1 - lifeRatio));

                // Reset when life expires or hits pool level
                if (p.life >= p.maxLife || p.mesh.position.y < 0.3) {
                    resetFountainParticle(p, f.x, f.z);
                }
            }
        }
    }

    // ════════════════════════════════════════════════════════════
    //  5. FLOATING LANTERNS (night only)
    // ════════════════════════════════════════════════════════════

    const LANTERN_COUNT = 25;
    const lanterns = [];

    function createLanterns() {
        const lanternGeo = new THREE.BoxGeometry(0.4, 0.6, 0.4);

        for (let i = 0; i < LANTERN_COUNT; i++) {
            const warmth = 0.8 + Math.random() * 0.2;
            const mat = new THREE.MeshBasicMaterial({
                color:      new THREE.Color(warmth, warmth * 0.6, warmth * 0.15),
                toneMapped: false,
                transparent: true,
                opacity:    0.0, // start invisible, appear at night
            });

            const mesh = new THREE.Mesh(lanternGeo, mat);
            mesh.visible = false;
            scene.add(mesh);

            lanterns.push({
                mesh,
                x: 0, y: 0, z: 0,
                driftX: 0,
                driftZ: 0,
                wobblePhase: Math.random() * Math.PI * 2,
                riseSpeed: 0,
                active: false,
            });

            resetLantern(lanterns[lanterns.length - 1], true);
        }
    }

    function resetLantern(l, scatter) {
        l.x = (Math.random() - 0.5) * 160;
        l.z = (Math.random() - 0.5) * 160;
        l.y = scatter ? Math.random() * 80 : 1 + Math.random() * 5;
        l.driftX = (Math.random() - 0.5) * 2;
        l.driftZ = (Math.random() - 0.5) * 1.5;
        l.riseSpeed = 1.5 + Math.random() * 2.5;
        l.wobblePhase = Math.random() * Math.PI * 2;
        l.mesh.position.set(l.x, l.y, l.z);
    }

    function updateLanterns(dt, elapsed) {
        const isNight = window.BACCARAT && window.BACCARAT.isNight;

        for (const l of lanterns) {
            if (!isNight) {
                // Fade out
                if (l.mesh.visible) {
                    l.mesh.material.opacity -= dt * 0.5;
                    if (l.mesh.material.opacity <= 0) {
                        l.mesh.visible = false;
                        l.active = false;
                    }
                }
                continue;
            }

            // Activate at night
            if (!l.active) {
                l.active = true;
                l.mesh.visible = true;
                resetLantern(l, false);
            }

            // Fade in
            if (l.mesh.material.opacity < 0.85) {
                l.mesh.material.opacity = Math.min(0.85, l.mesh.material.opacity + dt * 0.8);
            }

            // Rise
            l.y += l.riseSpeed * dt;
            l.x += l.driftX * dt;
            l.z += l.driftZ * dt;

            // Wobble
            l.wobblePhase += dt * 1.5;
            const wobbleX = Math.sin(l.wobblePhase) * 0.3;
            const wobbleZ = Math.cos(l.wobblePhase * 0.7) * 0.2;

            l.mesh.position.set(l.x + wobbleX, l.y, l.z + wobbleZ);
            l.mesh.rotation.z = Math.sin(l.wobblePhase * 0.5) * 0.1;
            l.mesh.rotation.x = Math.cos(l.wobblePhase * 0.3) * 0.08;

            // Recycle when too high
            if (l.y > 100) {
                resetLantern(l, false);
            }
        }
    }

    // ════════════════════════════════════════════════════════════
    //  6. NEON SIGN ENHANCEMENT
    // ════════════════════════════════════════════════════════════

    // We'll find existing neon MeshBasicMaterial objects and enhance them
    const enhancedNeons = [];
    let neonScanDone = false;

    function scanForNeons() {
        // Walk the scene and find MeshBasicMaterial objects with saturated colors
        scene.traverse((obj) => {
            if (!obj.isMesh) return;
            if (!obj.material) return;
            if (!obj.material.isMeshBasicMaterial) return;
            // Skip our own firework / lantern / beam meshes
            if (obj.userData._spectacle) return;

            const c = obj.material.color;
            const max = Math.max(c.r, c.g, c.b);
            const min = Math.min(c.r, c.g, c.b);
            const saturation = max > 0 ? (max - min) / max : 0;

            // Neon signs have high saturation or are very bright
            if (saturation > 0.3 || max > 0.9) {
                enhancedNeons.push({
                    mesh: obj,
                    baseR: c.r,
                    baseG: c.g,
                    baseB: c.b,
                    flickerTimer: Math.random() * 20,     // time until next flicker
                    flickerDuration: 0,
                    flickering: false,
                    startupDone: Math.random() > 0.15,    // 15% get startup flicker
                    startupPhase: 0,
                    startupTime: 2 + Math.random() * 3,
                    phaseOffset: Math.random() * Math.PI * 2,
                });
            }
        });
        neonScanDone = true;
    }

    function updateNeonEnhancement(dt, elapsed) {
        if (!neonScanDone) return;

        for (const n of enhancedNeons) {
            let intensity = 1.0;

            // Startup flicker sequence
            if (!n.startupDone) {
                n.startupPhase += dt;
                const progress = n.startupPhase / n.startupTime;
                if (progress < 1.0) {
                    // Rapid on/off flickering that stabilizes
                    const flickerRate = 30 - progress * 25; // starts fast, slows
                    const flicker = Math.sin(n.startupPhase * flickerRate);
                    intensity = flicker > (progress - 0.5) ? 1.0 : 0.05;
                } else {
                    n.startupDone = true;
                }
            }

            // Random flicker events (like real neon tubes)
            if (n.startupDone) {
                n.flickerTimer -= dt;
                if (n.flickerTimer <= 0 && !n.flickering) {
                    n.flickering = true;
                    n.flickerDuration = 0.05 + Math.random() * 0.15;
                    n.flickerTimer = 5 + Math.random() * 25; // next flicker in 5-30 seconds
                }
                if (n.flickering) {
                    n.flickerDuration -= dt;
                    // Quick intensity drops
                    intensity = Math.random() > 0.5 ? 0.15 : 0.9;
                    if (n.flickerDuration <= 0) {
                        n.flickering = false;
                    }
                }

                // Dramatic pulse
                const pulse = 0.7 + 0.3 * Math.sin(elapsed * 3.0 + n.phaseOffset);
                intensity *= pulse;
            }

            // Apply
            if (n.mesh.material && n.mesh.material.color) {
                n.mesh.material.color.setRGB(
                    n.baseR * intensity,
                    n.baseG * intensity,
                    n.baseB * intensity
                );
            }
        }
    }

    // ════════════════════════════════════════════════════════════
    //  MODULE INTERFACE
    // ════════════════════════════════════════════════════════════

    function init(ctx) {
        THREE = ctx.THREE;
        scene = ctx.scene;

        createHarbor();
        createLightBeams();
        createFireworkSystem();
        createFountain(15, 0);
        createFountain(-15, 0);
        createLanterns();

        // Tag our objects so neon scan skips them
        for (const p of fireworkParticles) p.mesh.userData._spectacle = true;
        for (const l of lanterns) l.mesh.userData._spectacle = true;
        for (const b of lightBeams) b.mesh.userData._spectacle = true;
        for (const f of fountains) {
            for (const p of f.particles) p.mesh.userData._spectacle = true;
        }

        // Delay neon scan to next frame so city-geometry has built everything
        setTimeout(() => scanForNeons(), 100);

        console.log(
            '%c Baccarat City %c Spectacle Online ',
            'background:#ff4488;color:#fff;font-weight:bold;padding:2px 6px;border-radius:3px 0 0 3px;',
            'background:#0a0a12;color:#ff4488;font-weight:bold;padding:2px 6px;border-radius:0 3px 3px 0;'
        );
    }

    function update(deltaTime, elapsedTime) {
        const dt = Math.min(deltaTime, 0.1); // clamp to avoid explosion on tab-switch

        updateWater(dt, elapsedTime);
        updateLightBeams(dt, elapsedTime);
        updateFireworks(dt, elapsedTime);
        updateFountains(dt);
        updateLanterns(dt, elapsedTime);
        updateNeonEnhancement(dt, elapsedTime);
    }

    // ── Register ─────────────────────────────────────────────
    window.BACCARAT.registerModule({ init, update });

})();

    // ── Building Type Detection ───────────────────────────────
    function detectBuildingType(group) {
        // Use position to determine type, matching city-geometry logic
        const gx = Math.round(group.position.x / CELL_SIZE);
        const gz = Math.round(group.position.z / CELL_SIZE);
        const dist = Math.max(Math.abs(gx), Math.abs(gz));

        if (dist <= 2) return 'casino';
        if (dist <= 4) {
            // Check height to differentiate
            let maxH = 0;
            group.traverse(function (c) {
                if (c.isMesh) {
                    const top = c.position.y + (c.geometry && c.geometry.parameters ? c.geometry.parameters.height / 2 : 0);
                    if (top > maxH) maxH = top;
                }
            });
            if (maxH > 40) return 'hotel';
            if (maxH < 15) return 'temple';
            return 'office';
        }
        if (dist <= 6) {
            let maxH = 0;
            group.traverse(function (c) {
                if (c.isMesh) {
                    const top = c.position.y + (c.geometry && c.geometry.parameters ? c.geometry.parameters.height / 2 : 0);
                    if (top > maxH) maxH = top;
                }
            });
            if (maxH < 2) return 'park';
            if (maxH < 12) return 'shop';
            if (maxH < 20) return 'residential';
            if (maxH < 25) return 'parking';
            return 'office';
        }
        // Outer
        let maxH = 0;
        group.traverse(function (c) {
            if (c.isMesh) {
                const top = c.position.y + (c.geometry && c.geometry.parameters ? c.geometry.parameters.height / 2 : 0);
                if (top > maxH) maxH = top;
            }
        });
        if (maxH < 2) return 'park';
        if (maxH < 12) return 'shop';
        if (maxH < 22) return 'residential';
        return 'parking';
    }

        if (!nameCounters[type]) nameCounters[type] = 0;
        const idx = nameCounters[type] % names.length;
        nameCounters[type]++;
        return names[idx];
    }

            if (!building.isGroup) continue;

            const type = detectBuildingType(building);
            building.userData.buildingType = type;
            building.userData.buildingName = assignName(type);
            building.userData.isBuilding = true;

    function getIntersectedBuilding(ndcX, ndcY) {
        if (!buildingsGroup) return null;

        const camera = window.BACCARAT.camera;
        if (!camera) return null;

        raycasterObj.setFromCamera({ x: ndcX, y: ndcY }, camera);

        // Collect all meshes from buildings group
        const meshes = [];
        buildingsGroup.traverse(function (child) {
            if (child.isMesh) meshes.push(child);
        });

        const intersects = raycasterObj.intersectObjects(meshes, false);
        if (intersects.length === 0) return null;

        // Walk up to find the building group
        let obj = intersects[0].object;
        while (obj && obj.parent !== buildingsGroup) {
            obj = obj.parent;
        }
        return obj;
    }

                child.material && child.material.color) {
                // Check for felt green color (0x1a6b3a)
                const c = child.material.color;
                if (Math.abs(c.r - 0.102) < 0.05 &&
                    Math.abs(c.g - 0.420) < 0.05 &&
                    Math.abs(c.b - 0.227) < 0.05) {
                    tableMeshes.push(child);
                }
            }
        });

        const intersects = raycasterObj.intersectObjects(tableMeshes, false);
        if (intersects.length > 0) {
            // Return the table group (parent of the mesh)
            return intersects[0].object.parent;
        }

        // Also check for clicks near tables by casting against a broader area
        // Check proximity to known table positions
        const ray = raycasterObj.ray;
        const ground = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.9);
        const hitPoint = new THREE.Vector3();
        if (ray.intersectPlane(ground, hitPoint)) {
            // Check if hit point is within 3 units of any table
            for (let i = 0; i < scene.children.length; i++) {
                const child = scene.children[i];
                if (!child.isGroup) continue;
                // Table groups have PointLights and are positioned at known coords
                let hasPointLight = false;
                let hasTableTop = false;
                child.traverse(function (c) {
                    if (c.isPointLight) hasPointLight = true;
                    if (c.isMesh && c.geometry && c.geometry.type === 'CylinderGeometry') {
                        const col = c.material && c.material.color;
                        if (col && Math.abs(col.r - 0.102) < 0.05 && Math.abs(col.g - 0.420) < 0.05) {
                            hasTableTop = true;
                        }
                    }
                });
                if (hasPointLight && hasTableTop) {
                    const dx = hitPoint.x - child.position.x;
                    const dz = hitPoint.z - child.position.z;
                    if (Math.sqrt(dx * dx + dz * dz) < 3) {
                        return child;
                    }
                }
            }
        }

        return null;
    }

    // ── Highlight System ──────────────────────────────────────
    function highlightBuilding(building) {
        if (building === hoveredBuilding) return;
        unhighlightBuilding();

        hoveredBuilding = building;
        hoveredOriginalColors = [];

        building.traverse(function (child) {
            if (child.isMesh && child.material && child.material.color) {
                // Store original
                hoveredOriginalColors.push({
                    mesh: child,
                    r: child.material.color.r,
                    g: child.material.color.g,
                    b: child.material.color.b,
                });
                // Brighten slightly
                child.material.color.r = Math.min(1, child.material.color.r * 1.3 + 0.05);
                child.material.color.g = Math.min(1, child.material.color.g * 1.3 + 0.05);
                child.material.color.b = Math.min(1, child.material.color.b * 1.3 + 0.05);
            }
        });
    }

    function unhighlightBuilding() {
        if (!hoveredBuilding) return;

        for (let i = 0; i < hoveredOriginalColors.length; i++) {
            const entry = hoveredOriginalColors[i];
            entry.mesh.material.color.r = entry.r;
            entry.mesh.material.color.g = entry.g;
            entry.mesh.material.color.b = entry.b;
        }

        hoveredOriginalColors = [];
        hoveredBuilding = null;
    }

    // ── Camera Transitions ────────────────────────────────────
    function saveCameraState() {
        const camera = window.BACCARAT.camera;
        if (!camera) return;

        savedCameraPosition = camera.position.clone();
        savedCameraRotation = camera.rotation.clone();
        if (camera.isOrthographicCamera) {
            savedCameraLeft = camera.left;
            savedCameraRight = camera.right;
            savedCameraTop = camera.top;
            savedCameraBottom = camera.bottom;
        }
    }

    function startTransition(targetPos, lookAtPos, duration, callback) {
        const camera = window.BACCARAT.camera;
        if (!camera) return;

        transitioning = true;
        transitionStart = performance.now() / 1000;
        transitionDuration = duration || 1.5;
        transitionFrom.pos = camera.position.clone();
        transitionFrom.rot = camera.rotation.clone();
        transitionTo.pos = targetPos.clone();
        transitionTo.lookAt = lookAtPos.clone();
        transitionCallback = callback || null;
    }

    function updateTransition(elapsed) {
        if (!transitioning) return;

        const camera = window.BACCARAT.camera;
        if (!camera) return;

        const now = performance.now() / 1000;
        let t = (now - transitionStart) / transitionDuration;
        if (t >= 1) {
            t = 1;
            transitioning = false;
        }

        // Ease in-out cubic
        const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        // Lerp position
        camera.position.lerpVectors(transitionFrom.pos, transitionTo.pos, eased);

        // LookAt the target
        if (transitionTo.lookAt) {
            camera.lookAt(transitionTo.lookAt);
        }

        camera.updateProjectionMatrix();

        if (t >= 1 && transitionCallback) {
            transitionCallback();
            transitionCallback = null;
        }
    }

    // ── Click-to-Zoom on Building ─────────────────────────────
    function zoomToBuilding(building) {
        if (interactionMode !== MODE_FREE) return;
        if (transitioning) return;

        saveCameraState();
        interactionMode = MODE_BUILDING_ZOOM;

        // Calculate building center and height
        const box = new THREE.Box3().setFromObject(building);
        const center = new THREE.Vector3();
        box.getCenter(center);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);

        orbitTarget = center.clone();
        orbitRadius = maxDim * 0.8 + 10;
        orbitHeight = size.y * 0.6 + 5;
        orbitAngle = 0;

        // Initial camera position for zoom
        const startAngle = Math.atan2(
            window.BACCARAT.camera.position.x - center.x,
            window.BACCARAT.camera.position.z - center.z
        );
        orbitAngle = startAngle;

        const targetPos = new THREE.Vector3(
            center.x + Math.sin(orbitAngle) * orbitRadius,
            center.y + orbitHeight,
            center.z + Math.cos(orbitAngle) * orbitRadius
        );

        startTransition(targetPos, center, 1.5, function () {
            // Show back button
            if (backButton) backButton.style.display = 'block';
        });

        // Convert camera to perspective-like view by tightening frustum
        const camera = window.BACCARAT.camera;
        if (camera.isOrthographicCamera) {
            const zoomFrustum = maxDim * 0.5 + 8;
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -zoomFrustum * aspect;
            camera.right = zoomFrustum * aspect;
            camera.top = zoomFrustum;
            camera.bottom = -zoomFrustum;
            camera.updateProjectionMatrix();
        }

        hideTooltip();
    }

    // ── Click-to-Watch Baccarat ───────────────────────────────
    function watchTable(tableGroup) {
        if (interactionMode !== MODE_FREE) return;
        if (transitioning) return;

        saveCameraState();
        interactionMode = MODE_TABLE_WATCH;
        watchingTable = tableGroup;
        tableOrbitAngle = 0;

        const tablePos = tableGroup.position.clone();
        const targetLookAt = tablePos.clone();
        targetLookAt.y = 0.9; // table top height

        const targetPos = new THREE.Vector3(
            tablePos.x + 3,
            2.5,
            tablePos.z + 3
        );

        startTransition(targetPos, targetLookAt, 1.5, function () {
            // Show baccarat HUD
            if (baccaratHUD) baccaratHUD.style.display = 'flex';
            if (backButton) backButton.style.display = 'block';
        });

        // Tighten frustum for close-up
        const camera = window.BACCARAT.camera;
        if (camera.isOrthographicCamera) {
            const zoomFrustum = 4;
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -zoomFrustum * aspect;
            camera.right = zoomFrustum * aspect;
            camera.top = zoomFrustum;
            camera.bottom = -zoomFrustum;
            camera.updateProjectionMatrix();
        }

        hideTooltip();
    }

    // ── Return to City View ───────────────────────────────────
    function returnToCity() {
        if (interactionMode === MODE_FREE) return;

        const camera = window.BACCARAT.camera;

        // Restore camera frustum
        if (camera.isOrthographicCamera && savedCameraLeft !== undefined) {
            camera.left = savedCameraLeft;
            camera.right = savedCameraRight;
            camera.top = savedCameraTop;
            camera.bottom = savedCameraBottom;
            camera.updateProjectionMatrix();
        }

        startTransition(savedCameraPosition, new THREE.Vector3(0, 0, 0), 1.2, function () {
            // Restore exact rotation
            camera.rotation.copy(savedCameraRotation);
            camera.updateProjectionMatrix();
        });

        interactionMode = MODE_FREE;
        watchingTable = null;
        orbitTarget = null;

        // Hide UI
        if (backButton) backButton.style.display = 'none';
        if (baccaratHUD) baccaratHUD.style.display = 'none';
    }

    // ── Input Handlers ────────────────────────────────────────
    function onPointerDown(e) {
        pointerDownPos.x = e.clientX;
        pointerDownPos.y = e.clientY;
        pointerDownTime = performance.now();
    }

    function onPointerUp(e) {
        const dx = e.clientX - pointerDownPos.x;
        const dy = e.clientY - pointerDownPos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const elapsed = performance.now() - pointerDownTime;

        // Only treat as click if minimal movement and short duration
        if (dist < CLICK_THRESHOLD && elapsed < CLICK_TIME_THRESHOLD) {
            handleClick(e);
        }
    }

    function handleClick(e) {
        if (transitioning) return;
        if (interactionMode !== MODE_FREE) return;

        // Convert to NDC
        const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
        const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;

        // Try table first (higher priority for click)
        const table = getIntersectedTable(ndcX, ndcY);
        if (table) {
            watchTable(table);
            return;
        }

        // Then try building
        const building = getIntersectedBuilding(ndcX, ndcY);
        if (building && building.userData.isBuilding) {
            zoomToBuilding(building);
            return;
        }
    }

    function onMouseMove(e) {
        mouseScreen.x = e.clientX;
        mouseScreen.y = e.clientY;
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    }

    function onKeyDown(e) {
        if (e.key === 'Escape') {
            if (interactionMode !== MODE_FREE) {
                returnToCity();
            }
        }
    }

    // ── Cursor Management ─────────────────────────────────────
    function updateCursor() {
        if (!rendererDom) return;
        if (interactionMode !== MODE_FREE) {
            document.body.style.cursor = 'default';
            return;
        }
        if (hoveredBuilding) {
            document.body.style.cursor = 'pointer';
        }
        // grab/grabbing handled by existing CSS on body
    }

    // ── Baccarat Score Simulation ─────────────────────────────
    let scoreUpdateTimer = 0;
    let playerScore = '-';
    let bankerScore = '-';

    function updateScoreDisplay() {
        const ps = document.getElementById('baccarat-player-score');
        const bs = document.getElementById('baccarat-banker-score');
        if (ps) ps.textContent = playerScore;
        if (bs) bs.textContent = bankerScore;
    }

    // ── Module Interface ──────────────────────────────────────
    function init(ctx) {
        THREE = ctx.THREE;
        scene = ctx.scene;
        rendererDom = ctx.renderer.domElement;

        raycasterObj = new THREE.Raycaster();

        // Create HTML overlays
        createTooltip();
        createBackButton();
        createBaccaratHUD();

        // Bind input (use capture on pointer events to detect clicks before pan system swallows them)
        rendererDom.addEventListener('pointerdown', onPointerDown, true);
        window.addEventListener('pointerup', onPointerUp, true);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('keydown', onKeyDown);

        console.log(
            '%c Baccarat City %c Interaction Module Online ',
            'background:#d4af37;color:#0a0a12;font-weight:bold;padding:2px 6px;border-radius:3px 0 0 3px;',
            'background:#0a0a12;color:#d4af37;font-weight:bold;padding:2px 6px;border-radius:0 3px 3px 0;'
        );
    }

    function update(dt, elapsed) {
        // Lazy find buildings (they may not exist at init time)
        if (!buildingsGroup) {
            findBuildings();
            if (buildingsGroup && !buildingsInitialized) {
                initBuildingNames();
            }
        }

        // Handle camera transitions
        if (transitioning) {
            updateTransition(elapsed);
            return; // Skip other updates during transition
        }

        const camera = window.BACCARAT.camera;
        if (!camera) return;

        // ── Building orbit mode ──
        if (interactionMode === MODE_BUILDING_ZOOM && orbitTarget) {
            orbitAngle += orbitSpeed * dt;
            const newX = orbitTarget.x + Math.sin(orbitAngle) * orbitRadius;
            const newZ = orbitTarget.z + Math.cos(orbitAngle) * orbitRadius;
            const newY = orbitTarget.y + orbitHeight;

            camera.position.set(newX, newY, newZ);
            camera.lookAt(orbitTarget);
            camera.updateProjectionMatrix();
            return;
        }

        // ── Table watch mode ──
        if (interactionMode === MODE_TABLE_WATCH && watchingTable) {
            tableOrbitAngle += 0.15 * dt;
            const tablePos = watchingTable.position;
            const watchR = 3.5;
            const newX = tablePos.x + Math.sin(tableOrbitAngle) * watchR;
            const newZ = tablePos.z + Math.cos(tableOrbitAngle) * watchR;

            camera.position.set(newX, 2.2, newZ);
            camera.lookAt(tablePos.x, 0.9, tablePos.z);
            camera.updateProjectionMatrix();

            // Update score display periodically
            scoreUpdateTimer += dt;
            if (scoreUpdateTimer > 2.0) {
                scoreUpdateTimer = 0;
                playerScore = String(Math.floor(Math.random() * 10));
                bankerScore = String(Math.floor(Math.random() * 10));
                updateScoreDisplay();
            }
            return;
        }

        // ── Free-roam hover detection ──
        if (interactionMode === MODE_FREE && buildingsGroup) {
            const building = getIntersectedBuilding(mouse.x, mouse.y);

            if (building && building.userData.isBuilding) {
                highlightBuilding(building);
                showTooltip(building, mouseScreen.x, mouseScreen.y);
            } else {
                unhighlightBuilding();
                hideTooltip();
            }

            // Also check table hover for cursor change
            if (!building) {
                const table = getIntersectedTable(mouse.x, mouse.y);
                if (table) {
                    document.body.style.cursor = 'pointer';
                } else {
                    // Restore default cursor (grab is in CSS)
                    if (!hoveredBuilding) {
                        document.body.style.cursor = '';
                    }
                }
            }
        }

        updateCursor();
    }

    // ── Register ──────────────────────────────────────────────
    if (window.BACCARAT && window.BACCARAT.registerModule) {
        window.BACCARAT.registerModule({ init, update });
    } else {
        const check = setInterval(function () {
            if (window.BACCARAT && window.BACCARAT.registerModule) {
                clearInterval(check);
                window.BACCARAT.registerModule({ init, update });
            }
        }, 100);
    }

})();

// === UI UPDATE LOOP ===
setInterval(() => {
  const B = window.BACCARAT;
  if (B && B.timeOfDay !== undefined) {
    const h = Math.floor(B.timeOfDay);
    const m = Math.floor((B.timeOfDay - h) * 60);
    document.getElementById('timeLabel').textContent = 
      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    document.getElementById('timeIcon').textContent = B.isNight ? '🌙' : '☀';
  }
}, 500);
</script>
</body>
